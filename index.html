<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QUARRY — a hunter &amp; hunted platformer</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b0d14; overflow: hidden; }
      body { display: flex; align-items: center; justify-content: center; }
      canvas { max-width: 100%; max-height: 100%; }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>
    <script>
      // =====================================================================
      // QUARRY — asymmetric hunter/hunted platformer (inspired by Hunter Hunted)
      // Gritty industrial. All art = inline SVG. One self-contained file.
      // =====================================================================
      const k = kaplay({ width: 960, height: 540, letterbox: true, background: [12, 12, 13], global: true });
      const TS = 48;
      setGravity(2100);
      const svg = (s) => "data:image/svg+xml," + encodeURIComponent(s);

      // favicon (Stalker eyes)
      (() => {
        const l = document.createElement("link");
        l.rel = "icon";
        l.href = svg(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#17130f"/><path d="M6 12 q10 -8 20 0 q2 9 -4 15 q-6 4 -12 0 q-6 -6 -4 -15z" fill="#3a2a2c"/><circle cx="21" cy="15" r="3" fill="#e8b13a"/><circle cx="12" cy="17" r="2.4" fill="#e8b13a"/></svg>`);
        document.head.appendChild(l);
      })();

      // =====================================================================
      // ART
      // =====================================================================
      loadSprite("sky", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540"><defs><linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2622"/><stop offset="48%" stop-color="#332b26"/><stop offset="100%" stop-color="#171615"/></linearGradient></defs><rect width="960" height="540" fill="url(#s)"/></svg>`));

      loadSprite("bgFar", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220"><g fill="#20242a"><rect x="18" y="90" width="42" height="130"/><rect x="70" y="120" width="26" height="100"/><rect x="112" y="64" width="26" height="156"/><rect x="150" y="108" width="52" height="112"/><rect x="212" y="78" width="22" height="142"/><rect x="246" y="128" width="60" height="92"/><rect x="322" y="96" width="34" height="124"/><rect x="362" y="54" width="18" height="166"/><rect x="390" y="116" width="72" height="104"/></g><g fill="#e8b13a" opacity="0.45"><rect x="120" y="84" width="4" height="6"/><rect x="222" y="96" width="4" height="6"/><rect x="366" y="72" width="4" height="6"/></g></svg>`));

      // interior back-wall panel (tiled across the whole level)
      loadSprite("wall", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128"><rect width="128" height="128" fill="#191b1f"/><g stroke="#111316" stroke-width="2"><line x1="0" y1="64" x2="128" y2="64"/><line x1="64" y1="0" x2="64" y2="128"/></g><g stroke="#262a2f" stroke-width="1" opacity="0.7"><line x1="0" y1="66" x2="128" y2="66"/><line x1="66" y1="0" x2="66" y2="128"/></g><g fill="#111316"><circle cx="10" cy="10" r="2"/><circle cx="118" cy="10" r="2"/><circle cx="10" cy="118" r="2"/><circle cx="118" cy="118" r="2"/><circle cx="64" cy="64" r="2"/></g><ellipse cx="30" cy="92" rx="26" ry="15" fill="#131418" opacity="0.6"/><ellipse cx="100" cy="38" rx="22" ry="13" fill="#131418" opacity="0.5"/><path d="M42 2 l5 124" stroke="#3a2c20" stroke-width="2" opacity="0.14"/></svg>`));

      loadSprite("girder", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="128"><rect x="4" width="18" height="128" fill="#2b2f33"/><rect x="4" width="4" height="128" fill="#3a3f44"/><rect x="18" width="4" height="128" fill="#1e2124"/><g fill="#15171a"><circle cx="13" cy="12" r="2"/><circle cx="13" cy="44" r="2"/><circle cx="13" cy="76" r="2"/><circle cx="13" cy="108" r="2"/></g></svg>`));

      loadSprite("pipeV", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="48"><rect x="4" width="12" height="48" fill="#3a3f44"/><rect x="4" width="4" height="48" fill="#4a5055"/><rect x="13" width="3" height="48" fill="#22262a"/><rect x="1" y="20" width="18" height="8" rx="2" fill="#2b3034"/></svg>`));

      loadSprite("tile", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect width="48" height="48" fill="#34383b"/><rect width="48" height="6" fill="#474c4f"/><rect y="6" width="48" height="2" fill="#22262a"/><rect y="43" width="48" height="5" fill="#20242a"/><ellipse cx="26" cy="30" rx="13" ry="7" fill="#2b2e30" opacity="0.55"/><path d="M11 8 l3 32" stroke="#5e3d24" stroke-width="3" opacity="0.45"/><g fill="#20242a"><circle cx="6" cy="12" r="2"/><circle cx="42" cy="12" r="2"/><circle cx="6" cy="39" r="2"/><circle cx="42" cy="39" r="2"/></g></svg>`));

      loadSprite("ladder", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect x="10" width="5" height="48" fill="#4a4030"/><rect x="33" width="5" height="48" fill="#4a4030"/><g fill="#5a4f3a"><rect x="10" y="5" width="28" height="4"/><rect x="10" y="21" width="28" height="4"/><rect x="10" y="37" width="28" height="4"/></g><g fill="#2e281c"><rect x="10" y="5" width="28" height="1"/><rect x="10" y="21" width="28" height="1"/><rect x="10" y="37" width="28" height="1"/></g></svg>`));

      loadSprite("door", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="40" height="66"><rect x="2" y="2" width="36" height="64" rx="4" fill="#2b2f33"/><rect x="6" y="6" width="28" height="56" rx="3" fill="#141314"/><rect x="6" y="6" width="28" height="56" rx="3" fill="none" stroke="#c8992e" stroke-width="2" opacity="0.85"/><ellipse cx="20" cy="34" rx="11" ry="24" fill="#e8b13a" opacity="0.18"/><circle cx="20" cy="8" r="3" fill="#f0c04a"/><g stroke="#c8992e" stroke-width="2" opacity="0.5"><line x1="10" y1="22" x2="30" y2="22"/><line x1="10" y1="46" x2="30" y2="46"/></g></svg>`));

      loadSprite("spikes", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="24"><rect y="18" width="48" height="6" fill="#2f3436"/><g fill="#5a5f61" stroke="#20242a" stroke-width="1"><path d="M2 22 L8 3 L14 22 z"/><path d="M14 22 L20 3 L26 22 z"/><path d="M26 22 L32 3 L38 22 z"/><path d="M38 22 L44 3 L48 22 z"/></g><g stroke="#7a4a28" stroke-width="1" opacity="0.5"><path d="M8 6 l0 12"/><path d="M32 6 l0 12"/></g></svg>`));

      loadSprite("cell", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28"><circle cx="11" cy="15" r="10" fill="#5ee08a" opacity="0.16"/><rect x="8" y="0" width="6" height="4" fill="#3a3d3f"/><rect x="4" y="3" width="14" height="23" rx="3" fill="#2c2f31" stroke="#1c1f21"/><rect x="7" y="7" width="8" height="15" rx="2" fill="#3aa06a"/><rect x="7" y="7" width="8" height="6" rx="2" fill="#7ee0a0" opacity="0.5"/></svg>`));

      loadSprite("exit", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="72"><rect x="4" y="2" width="40" height="70" rx="3" fill="#2c3033"/><rect x="8" y="6" width="32" height="62" fill="#3c4144" stroke="#20242a" stroke-width="2"/><g opacity="0.85"><path d="M11 62 l20 -22" stroke="#c8992e" stroke-width="5"/><path d="M20 64 l14 -16" stroke="#1c1c1c" stroke-width="5"/></g><circle cx="24" cy="18" r="10" fill="#e8b13a" opacity="0.3"/><circle cx="24" cy="18" r="5" fill="#f0c04a"/></svg>`));

      // drone: 2-frame strip (rotor flicker + eye pulse)
      const droneFrame = (alt) => `
        <rect x="${alt ? 3 : 1}" y="6" width="${alt ? 5 : 9}" height="3" fill="#3a3d3f" opacity="${alt ? 0.6 : 1}"/>
        <rect x="${alt ? 28 : 26}" y="6" width="${alt ? 5 : 9}" height="3" fill="#3a3d3f" opacity="${alt ? 0.6 : 1}"/>
        ${alt ? '<rect x="0" y="6" width="36" height="3" fill="#3a3d3f" opacity="0.25"/>' : ""}
        <path d="M7 10 h22 q5 7 -2 15 h-18 q-7 -8 -2 -15z" fill="#45494b"/>
        <rect x="7" y="10" width="22" height="4" fill="#565b5d"/>
        <path d="M11 13 l-1 12" stroke="#6b4527" stroke-width="2" opacity="0.5"/>
        <circle cx="18" cy="19" r="5.5" fill="#7a1e1e"/><circle cx="18" cy="19" r="${alt ? 3.2 : 2.6}" fill="#ef4444"/>
        <g fill="#232527"><circle cx="9" cy="20" r="1.5"/><circle cx="27" cy="20" r="1.5"/></g>`;
      loadSprite("drone", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="72" height="34">
        <g>${droneFrame(false)}</g><g transform="translate(36 0)">${droneFrame(true)}</g></svg>`),
        { sliceX: 2, anims: { spin: { from: 0, to: 1, speed: 9, loop: true } } });

      // human v2 "Jack": muscular rugged survivor — 7-frame strip (44x60)
      const humanFrame = (p) => {
        const dy = p.dy || 0, rdy = (p.rdy || 0) + dy;
        const leg = (x, ang, dark) => `<g transform="rotate(${ang || 0} ${x + 3} 41)">
          <rect x="${x}" y="41" width="7" height="${p.tuck ? 11 : 15}" rx="2" fill="${dark ? "#26242a" : "#312e36"}"/>
          <rect x="${x - 2}" y="${p.tuck ? 49 : 54}" width="11" height="4" rx="1" fill="#171512"/></g>`;
        return `
          ${p.tuck ? "" : `<ellipse cx="22" cy="57" rx="12" ry="2.5" fill="#000" opacity="0.3"/>`}
          ${leg(13, p.lf, true)}${leg(24, p.rf, false)}
          <g transform="translate(0 ${dy})">
            <path d="M15 25 q-5 6 -3 12 q1 4 5 6" stroke="#8a6a4c" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M12 24 q10 -6 20 0 l1 12 q-2 6 -11 6 q-9 0 -11 -6 z" fill="#3a4038"/>
            <path d="M12 24 l3 -4 4 2 -2 5z" fill="#8a6a4c"/>
            <path d="M32 24 l-3 -4 -4 2 2 5z" fill="#b08d6a"/>
            <rect x="13" y="40" width="18" height="3" fill="#241f1a"/>
            <rect x="20" y="40" width="4" height="3" fill="#8a7a4a"/>
            <path d="M22 24 l0 12" stroke="#2e332c" stroke-width="1.5"/>
            <circle cx="22" cy="13" r="7.5" fill="#b08d6a"/>
            <path d="M14.5 13 q-1 -9 8 -9.5 q8 0.5 7.5 8 q-3 -4 -7 -4.5 q-6 -0.5 -8.5 6z" fill="#4a3220"/>
            <path d="M17 19 q5 3 10 0 l0 2 q-5 2 -10 0z" fill="#8a6a4c" opacity="0.5"/>
            <circle cx="25.5" cy="12.5" r="1.1" fill="#1c1410"/>
            <path d="M29 25 q6 3 6 8" stroke="#b08d6a" stroke-width="7" fill="none" stroke-linecap="round"/>
            <ellipse cx="30.5" cy="27" rx="3.4" ry="4.4" fill="#b08d6a"/>
          </g>
          <g transform="translate(0 ${rdy})">
            <rect x="27" y="30" width="16" height="4" rx="1" fill="#26262a"/>
            <rect x="25" y="33" width="8" height="3" fill="#1e1e22"/>
            <rect x="39" y="29" width="4" height="2" fill="#3a3a40"/>
            <path d="M33 34 l2 4" stroke="#b08d6a" stroke-width="4" stroke-linecap="round"/>
          </g>`;
      };
      const HFRAMES = [
        humanFrame({}), humanFrame({ dy: 1 }),                              // idle breath
        humanFrame({ lf: 26, rf: -22, rdy: -1 }), humanFrame({ lf: 7, rf: -5, dy: 1 }),   // run
        humanFrame({ lf: -22, rf: 26, rdy: -1 }), humanFrame({ lf: -5, rf: 7, dy: 1 }),
        humanFrame({ lf: -34, rf: 30, tuck: true, rdy: -2, dy: -1 }),       // jump: dramatic split
      ];
      loadSprite("human", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="${44 * 7}" height="60">${HFRAMES.map((f, i) => `<g transform="translate(${i * 44} 0)">${f}</g>`).join("")}</svg>`),
        { sliceX: 7, anims: { idle: { from: 0, to: 1, speed: 2.5, loop: true }, run: { from: 2, to: 5, speed: 11, loop: true }, jump: 6 } });

      // stalker v2: towering bipedal horned beast (HH box-art archetype) — 7-frame strip (56x84)
      const stalkerFrame = (p) => {
        const dy = p.dy || 0, m = p.mouth == null ? 2 : p.mouth;
        const armF = (ang) => `<g transform="rotate(${ang || 0} 38 ${34 + dy})">
          <path d="M38 ${34 + dy} q10 4 11 16 q1 8 -1 14" stroke="#c07830" stroke-width="11" fill="none" stroke-linecap="round"/>
          <path d="M47 ${60 + dy} q0 6 -1 9" stroke="#8a5220" stroke-width="9" stroke-linecap="round"/>
          <rect x="42" y="${56 + dy}" width="11" height="5" rx="2" fill="#2e2a30"/>
          <g fill="#e8d8b8"><path d="M44 ${70 + dy} l-2 7 4 -6z"/><path d="M48 ${70 + dy} l0 8 3 -7z"/><path d="M52 ${69 + dy} l2 7 1 -8z"/></g></g>`;
        const armB = (ang) => `<g transform="rotate(${ang || 0} 20 ${34 + dy})">
          <path d="M20 ${34 + dy} q-8 6 -8 18 q0 8 2 12" stroke="#8a5220" stroke-width="10" fill="none" stroke-linecap="round"/>
          <rect x="8" y="${58 + dy}" width="10" height="5" rx="2" fill="#26222a"/>
          <g fill="#cfc0a8"><path d="M10 ${70 + dy} l-2 7 4 -6z"/><path d="M14 ${70 + dy} l0 8 3 -7z"/></g></g>`;
        const leg = (hipX, ang, dark) => `<g transform="rotate(${ang || 0} ${hipX} ${58 + dy})">
          <path d="M${hipX} ${58 + dy} q-3 8 -6 12 q6 6 4 11" stroke="${dark ? "#8a5220" : "#a86428"}" stroke-width="10" fill="none" stroke-linecap="round"/>
          <path d="M${hipX - 4} 79 l-6 2 12 1z" fill="${dark ? "#3a2a1c" : "#4a3424"}"/></g>`;
        return `
          <ellipse cx="28" cy="81" rx="19" ry="3" fill="#000" opacity="0.35"/>
          ${leg(22, p.l1, true)}${leg(34, p.l2, false)}
          ${armB(p.la)}
          <path d="M12 ${52 + dy} q-6 -20 6 -30 q8 -7 20 -6 q16 2 20 14 q3 10 -2 18 q-4 8 -14 10 q-18 4 -30 -6z" fill="#c07830"/>
          <path d="M14 ${50 + dy} q-4 -16 6 -26 q-2 12 2 20 q-4 4 -8 6z" fill="#8a5220"/>
          <path d="M40 ${18 + dy} q8 4 12 12 q2 8 -2 14 q6 -2 6 -10 q0 -12 -16 -16z" fill="#e0a050" opacity="0.7"/>
          <g fill="#8a5220"><path d="M12 ${52 + dy} l-4 6 7 -2z"/><path d="M20 ${58 + dy} l-3 7 6 -3z"/><path d="M40 ${58 + dy} l2 7 4 -6z"/></g>
          <g fill="#8a5220"><path d="M18 ${24 + dy} l-3 -6 6 2z"/><path d="M26 ${18 + dy} l-2 -7 6 3z"/><path d="M35 ${15 + dy} l0 -7 5 4z"/></g>
          <path d="M36 ${20 + dy} q12 -4 17 4 q3 5 0 9 l-14 5 q-7 -6 -3 -18z" fill="#b87838"/>
          <path d="M40 ${20 + dy} q8 -2 12 2" stroke="#6a3c18" stroke-width="2.5" fill="none"/>
          <path d="M50 ${30 + dy} q4 1 3 4 l-12 6 q-4 -3 -5 -7z" fill="#8a5220"/>
          <path d="M39 ${33 + dy} q6 ${2 + m} 12 ${m - 1}" stroke="#26100a" stroke-width="${3 + m}" stroke-linecap="round" fill="none"/>
          <g fill="#e8d8b8"><path d="M41 ${32 + dy} l1.5 ${3 + m * 0.6} 2 -${3 + m * 0.6}z"/><path d="M46 ${32.5 + dy} l1.5 ${3 + m * 0.7} 2 -${3 + m * 0.7}z"/><path d="M50.5 ${32 + dy} l1.2 ${2.5 + m * 0.7} 1.8 -${2.5 + m * 0.7}z"/></g>
          <circle cx="47" cy="${24 + dy}" r="6" fill="#ff7030" opacity="0.2"/>
          <circle cx="46" cy="${24 + dy}" r="1.8" fill="#ffd040"/>
          <circle cx="51" cy="${25 + dy}" r="1.4" fill="#ff8030"/>
          <path d="M42 ${16 + dy} q-16 -11 -30 -4 q-6 3 -7 9 q10 -6 19 -4 q10 2 14 6z" fill="#3a2a1c"/>
          <path d="M5 ${21 + dy} q-4 3 -4 7 q6 -5 11 -4z" fill="#e8d8b8"/>
          <path d="M44 ${15 + dy} q5 -11 8 -10 q3 1 3 5 q-4 -2 -6 1 q-4 3 -5 6z" fill="#3a2a1c"/>
          <path d="M52 ${10 + dy} q3 1 3 4 q-4 -2 -7 -1z" fill="#e8d8b8"/>
          ${armF(p.ra)}`;
      };
      const SFRAMES = [
        stalkerFrame({}), stalkerFrame({ dy: 2, mouth: 1 }),                                 // idle breath
        stalkerFrame({ l1: 20, l2: -16, la: -12, ra: 14 }), stalkerFrame({ dy: 2, l1: 4, l2: 4, la: 4, ra: 4 }),  // two-legged stride
        stalkerFrame({ l1: -16, l2: 20, la: 14, ra: -14 }), stalkerFrame({ dy: 2, l1: 4, l2: 4, la: 4, ra: 4 }),
        stalkerFrame({ dy: -2, ra: -38, la: -30, l1: 24, l2: -20, mouth: 7 }),               // lunge: claws forward, roaring
      ];
      loadSprite("stalker", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="${56 * 7}" height="84">${SFRAMES.map((f, i) => `<g transform="translate(${i * 56} 0)">${f}</g>`).join("")}</svg>`),
        { sliceX: 7, anims: { idle: { from: 0, to: 1, speed: 2.2, loop: true }, run: { from: 2, to: 5, speed: 12, loop: true }, jump: 6 } });
      loadSprite("redglow", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><defs><radialGradient id="rg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff5040" stop-opacity="0.55"/><stop offset="100%" stop-color="#ff5040" stop-opacity="0"/></radialGradient></defs><circle cx="40" cy="40" r="40" fill="url(#rg)"/></svg>`));

      loadSprite("barrel", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38"><ellipse cx="15" cy="36" rx="12" ry="2.5" fill="#000" opacity="0.3"/><rect x="3" y="4" width="24" height="30" rx="3" fill="#5a4632"/><rect x="3" y="4" width="7" height="30" rx="3" fill="#6b543c"/><rect x="3" y="10" width="24" height="4" fill="#33281c"/><rect x="3" y="24" width="24" height="4" fill="#33281c"/><ellipse cx="15" cy="5" rx="12" ry="3" fill="#4a3a28"/><path d="M15 15 l5 9 -10 0 z" fill="#c8992e"/></svg>`));

      loadSprite("crate", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="34" height="32"><ellipse cx="17" cy="30" rx="15" ry="2.5" fill="#000" opacity="0.3"/><rect x="2" y="2" width="30" height="28" fill="#4a4436"/><path d="M2 2 L32 30 M32 2 L2 30" stroke="#2e2a20" stroke-width="3"/><rect x="2" y="2" width="30" height="28" fill="none" stroke="#2e2a20" stroke-width="3"/><rect x="2" y="2" width="30" height="6" fill="#5a5344"/></svg>`));

      loadSprite("vent", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="44" height="18"><rect width="44" height="18" rx="2" fill="#2b2f33"/><g stroke="#16181b" stroke-width="2"><line x1="7" y1="3" x2="7" y2="15"/><line x1="15" y1="3" x2="15" y2="15"/><line x1="23" y1="3" x2="23" y2="15"/><line x1="31" y1="3" x2="31" y2="15"/><line x1="39" y1="3" x2="39" y2="15"/></g><rect width="44" height="3" fill="#3a3f44"/></svg>`));

      loadSprite("sign", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"><rect x="1" y="1" width="24" height="24" rx="2" fill="#c8992e"/><rect x="3" y="3" width="20" height="20" rx="1" fill="#161514"/><path d="M13 6 L21 20 L5 20 Z" fill="#e8b13a"/><rect x="12" y="11" width="2" height="5" fill="#161514"/><rect x="12" y="17" width="2" height="2" fill="#161514"/></svg>`));

      loadSprite("cable", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="12" height="72"><path d="M6 0 q5 28 0 46 q-5 16 0 24" stroke="#141518" stroke-width="3" fill="none"/><circle cx="6" cy="70" r="3" fill="#2b2f33"/></svg>`));

      loadSprite("bomb", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="18" height="20"><rect x="8" y="0" width="2" height="4" fill="#7a4a28"/><circle cx="9" cy="2" r="1.6" fill="#e8b13a"/><circle cx="9" cy="12" r="7" fill="#2a2c2e" stroke="#131416"/><circle cx="6" cy="9" r="2" fill="#44484a" opacity="0.7"/></svg>`));

      loadSprite("lamp", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><defs><radialGradient id="l" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e8b13a" stop-opacity="0.7"/><stop offset="100%" stop-color="#e8b13a" stop-opacity="0"/></radialGradient></defs><circle cx="70" cy="70" r="70" fill="url(#l)"/></svg>`));

      loadSprite("fog", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="180"><defs><radialGradient id="f" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#6a5a48" stop-opacity="0.5"/><stop offset="100%" stop-color="#6a5a48" stop-opacity="0"/></radialGradient></defs><ellipse cx="300" cy="90" rx="300" ry="80" fill="url(#f)"/></svg>`));

          const ring = add([circle(8), pos(p), anchor("center"), color(255, 220, 150), opacity(0.6), lifespan(0.3, { fade: 0.3 }), z(35)]);
          tween(8, 96, 0.28, (r) => (ring.radius = r), easings.easeOutQuad);
          burst(p, rgb(240, 170, 80), 20, 320, 9); burst(p, rgb(90, 90, 92), 14, 240, 8);
          get("enemy").forEach((e) => { if (e.pos.dist(p) < 96) killEnemy(e); });
          get("nemesis").forEach((n) => { if (n.pos.dist(p) < 110) hitNemesis(n); });
        }
        function throwBomb() {
          if (time() - lastBomb < 1.1) return; lastBomb = time(); SFX.toss();
          const g = add([sprite("bomb"), pos(player.pos.x + facing * 16, player.pos.y - 6), anchor("center"), area({ scale: 0.7 }), body(), rotate(0), z(5), "bomb"]);
          g.vel = vec2(facing * 360, -430); g.onUpdate(() => { g.angle += facing * 420 * dt(); });
          wait(0.9, () => { if (g.exists()) { const p = g.pos.clone(); destroy(g); explode(p); } });
        }
        function useDoor() {
          if (nearDoor && nearDoor.partner && time() - lastDoorTime < 0.1 && time() > doorCd) {
            doorCd = time() + 0.6; SFX.warp(); flash(rgb(230, 180, 90), 0.4); burst(player.pos, rgb(230, 180, 90), 14, 220, 6);
            player.pos = nearDoor.partner.add(0, -8); player.vel = vec2(0, 0); burst(player.pos, rgb(230, 180, 90), 14, 220, 6);
          }
        }

        function jump() {
          if (onLadderNow) { player.gravityScale = 1; ladderCd = time() + 0.28; }
          if (CFG.wallClimb && !player.isGrounded() && wallStick !== 0) {
            player.jump(CFG.jumpForce * 0.95); player.vel = vec2(-wallStick * 340, player.vel.y);
            facing = -wallStick; player.flipX = facing < 0; jumpsLeft = maxJumps - 1;
            squash(0.72, 1.3); dust(player.pos.add(wallStick * 8, 12)); SFX.jump2(); return;
          }
          if (jumpsLeft > 0) { const mid = jumpsLeft < maxJumps; player.jump(CFG.jumpForce); jumpsLeft -= 1; squash(0.74, 1.28); dust(player.pos.add(0, 24)); mid ? SFX.jump2() : SFX.jump(); }
        }
        ["space", "up", "w"].forEach((key) => key === "space" ? onKeyPress(key, jump) : null);
        onKeyPress("space", jump); onGamepadButtonPress("south", jump);
        ["j", "x"].forEach((key) => onKeyPress(key, attack)); onGamepadButtonPress("west", attack); onGamepadButtonPress("east", attack);
        ["k", "c"].forEach((key) => onKeyPress(key, () => { if (CFG.bomb) throwBomb(); })); onGamepadButtonPress("north", () => { if (CFG.bomb) throwBomb(); });
        onKeyPress("e", useDoor); onGamepadButtonPress("dpad-up", useDoor);
        onKeyPress("r", () => go("game", sideKey));

        // =================================================================
        // NEMESIS — the opposite side hunts YOU across the map (issue #9)
        // =================================================================
        const NKEY = sideKey === "human" ? "stalker" : "human";
        const NCFG = SIDES[NKEY];
        const solid = (c, r) => GRID[r] && GRID[r][c] === "=";
        const cellOf = (p) => [Math.floor(p.x / TS), Math.floor(p.y / TS)];
        const NEM_SPAWNS = [vec2(50 * TS, TS), vec2(70 * TS, 9 * TS), vec2(6 * TS, 3 * TS), vec2(36 * TS, 12 * TS)];
        let nemesis = null, nemHeartbeat = 0;
        const warn = add([text("", { size: 18 }), pos(width() / 2, 46), anchor("center"), fixed(), z(200), color(235, 120, 100), outline(3, rgb(20, 10, 10)), opacity(0)]);

        function hitNemesis(n) {
          if (!n.exists() || time() < n.iframes) return;
          n.iframes = time() + 0.35; n.hp -= 1;
          burst(n.pos, rgb(...NCFG.color), 10, 200, 6); shake(4); SFX.kill();
          if (n.hp <= 0) {
            addKaboom(n.pos, { scale: 0.8 }); burst(n.pos, rgb(...NCFG.color), 22, 300, 9);
            popText(n.pos, "+5 HUNTER DOWN", rgb(255, 200, 140)); score += 5; updateHUD();
            destroy(n); nemesis = null;
            wait(rand(12, 18), () => { if (get("player").length) spawnNemesis(true); });
          } else { n.flash = time() + 0.15; }
        }

        function spawnNemesis(returning) {
          const far = NEM_SPAWNS.slice().sort((a, b) => b.dist(player.pos) - a.dist(player.pos))[0];
          nemesis = add([
            sprite(NCFG.sprite, { anim: "idle" }), pos(far), anchor("center"),
            area({ scale: vec2(0.6, 0.82) }), body({ jumpForce: NCFG.jumpForce }), opacity(1), z(6), "nemesis",
            { hp: 3, iframes: 0, flash: 0, dir: choose([-1, 1]), state: "patrol", anim: "idle", atkCd: 0, climbing: false, senseAt: time() + 16 },
          ]);
          nemesis.add([sprite("shadow"), pos(0, NCFG.shadowY), anchor("center"), z(-1), opacity(0.6)]);
          if (NCFG.glow) {
            const g = nemesis.add([sprite("redglow"), pos(NCFG.glow[0], NCFG.glow[1]), anchor("center"), scale(0.55), opacity(0.4), z(1)]);
            g.onUpdate(() => { g.pos.x = NCFG.glow[0] * (nemesis && nemesis.flipX ? -1 : 1); g.opacity = 0.3 + Math.sin(time() * 5) * 0.15; });
          }
          if (returning) { popText(vec2(width() / 2, 90).add(getCamPos()).sub(width() / 2, height() / 2), "THE HUNTER RETURNS", rgb(235, 120, 100)); SFX.warp(); }

          // the hunter knows its hunting ground — hazards don't hurt it,
          // only the player's attacks do (otherwise it suicides on spikes)
          nemesis.onCollide("player", () => hurt());

          nemesis.onUpdate(() => {
            const n = nemesis; if (!n) return;
            const toP = player.pos.sub(n.pos), dist = toP.len(), sameFloor = Math.abs(toP.y) < 110;
            // occasionally "senses" the player from anywhere — keeps pressure on
            if (time() > n.senseAt) { n.state = "hunt"; n.senseAt = time() + rand(14, 22); }
            if ((dist < 400 && sameFloor) || dist < 150) n.state = "hunt";
            else if (n.state === "hunt" && dist > 650) n.state = "patrol";

            const spd = NCFG.speed * (n.state === "hunt" ? 0.92 : 0.55);
            let vx = 0;
            const [pc, pr] = cellOf(n.pos);

            if (n.state === "patrol") {
              vx = n.dir;
              const aheadC = pc + n.dir;
              if (solid(aheadC, pr) || (!solid(aheadC, pr + 1) && !solid(aheadC, pr + 2) && n.isGrounded())) n.dir *= -1;
            } else {
              vx = toP.x > 14 ? 1 : toP.x < -14 ? -1 : 0; n.dir = vx || n.dir;
              // player is on another floor: seek a ladder in that direction
              if (!sameFloor) {
                const wantUp = toP.y < 0;
                let best = null, bd = 1e9;
                for (const L of LADDERS) {
                  const lx = L.c * TS + TS / 2, ly0 = L.r0 * TS, ly1 = (L.r1 + 1) * TS;
                  const usable = wantUp ? n.pos.y > ly0 && n.pos.y < ly1 + TS * 2 : n.pos.y < ly1;
                  const d = Math.abs(lx - n.pos.x);
                  if (usable && d < bd) { bd = d; best = { lx, wantUp }; }
                }
                if (best) {
                  vx = best.lx > n.pos.x + 8 ? 1 : best.lx < n.pos.x - 8 ? -1 : 0;
                  if (Math.abs(best.lx - n.pos.x) < 14) { n.climbing = true; n.gravityScale = 0; n.vel = vec2(0, best.wantUp ? -CLIMB : CLIMB); }
                }
              }
              if (n.climbing && sameFloor) { n.climbing = false; n.gravityScale = 1; }
              // attack in range
              if (time() > n.atkCd) {
                if (NCFG.mode === "ranged" && dist < 330 && sameFloor && Math.abs(toP.y) < 46) {
                  n.atkCd = time() + 1.35; SFX.shoot();
                  const dirx = toP.x > 0 ? 1 : -1;
                  const nb = add([rect(18, 5, { radius: 2 }), pos(n.pos.x + dirx * 24, n.pos.y - 4), anchor("center"), color(255, 130, 110), outline(2, rgb(90, 30, 20)), area(), move(vec2(dirx, 0), 700), offscreen({ destroy: true }), z(5), "nbullet"]);
                  nb.onCollide("player", () => { destroy(nb); hurt(); });
                  nb.onCollide("platform", () => destroy(nb));
                } else if (NCFG.mode === "melee" && dist < 90) {
                  n.atkCd = time() + 0.9; SFX.claw(); n.move((toP.x > 0 ? 1 : -1) * 220, 0);
                }
              }
            }
            if (!n.climbing) {
              if (vx !== 0) n.move(vx * spd, 0);
              // hop over walls when blocked
              if (n.isGrounded() && vx !== 0 && solid(pc + (vx > 0 ? 1 : -1), pr)) n.jump(NCFG.jumpForce * 0.9);
            } else if (vx !== 0) n.move(vx * spd * 0.4, 0);
            n.flipX = n.dir < 0;
            // anims + hit flash
            const want = !n.isGrounded() && !n.climbing ? "jump" : Math.abs(vx) > 0 || n.climbing ? "run" : "idle";
            if (n.anim !== want) { n.anim = want; n.play(want); }
            n.opacity = time() < n.flash ? 0.5 : 1;
            if (n.pos.y > LEVEL_H + 200) { n.pos = NEM_SPAWNS[0].clone(); n.vel = vec2(0, 0); n.climbing = false; n.gravityScale = 1; }
          });
        }
        spawnNemesis(false);

        // dread feedback: warning text + heartbeat when the hunter is close
        onUpdate(() => {
          const n = nemesis;
          const d = n ? n.pos.dist(player.pos) : 1e9;
          warn.text = "⚠ THE HUNTER IS NEAR";
          warn.opacity = d < 420 ? 0.45 + Math.sin(time() * 6) * 0.3 : 0;
          if (d < 320 && time() > nemHeartbeat) {
            nemHeartbeat = time() + (d < 180 ? 0.42 : 0.75);
            seq([[52, 0.09, "sine", 0.22, 40], [44, 0.14, "sine", 0.14, 30]]);
          }
        });

        const camTarget = () => vec2(clamp(player.pos.x, width() / 2, Math.max(LEVEL_W - width() / 2, width() / 2)), clamp(player.pos.y, height() / 2, Math.max(LEVEL_H - height() / 2, height() / 2)) - 20);

        player.onUpdate(() => {
          if (!player.isGrounded()) airTime += dt();
          let dx = 0;
          if (isKeyDown("left") || isKeyDown("a")) dx -= 1;
          if (isKeyDown("right") || isKeyDown("d")) dx += 1;
          if (isGamepadButtonDown("dpad-left")) dx -= 1;
          if (isGamepadButtonDown("dpad-right")) dx += 1;
          const stick = getGamepadStick("left");
          if (stick && Math.abs(stick.x) > 0.3) dx += stick.x;
          dx = clamp(dx, -1, 1);
          const up = isKeyDown("up") || isKeyDown("w") || (stick && stick.y < -0.4);
          const down = isKeyDown("down") || isKeyDown("s") || (stick && stick.y > 0.4);
          if (Math.abs(dx) > 0.05) { player.move(dx * CFG.speed, 0); facing = dx > 0 ? 1 : -1; player.flipX = facing < 0; }

          // ladder
          if (ladderActive()) {
            onLadderNow = true; player.gravityScale = 0; jumpsLeft = maxJumps;
            player.vel = vec2(player.vel.x, up ? -CLIMB : down ? CLIMB : 0);
          } else { onLadderNow = false; player.gravityScale = 1; }

          // wall-climb (alien), only when not on a ladder
          wallStick = 0;
          if (!onLadderNow && CFG.wallClimb && !player.isGrounded() && wallActive()) {
            const into = (wallDir > 0 && dx > 0.1) || (wallDir < 0 && dx < -0.1);
            if (into) {
              wallStick = wallDir; player.flipX = wallDir < 0;
              if (up) player.vel = vec2(player.vel.x, -150); else if (player.vel.y > 60) player.vel = vec2(player.vel.x, 60);
              if (rand() < 0.35) add([circle(rand(2, 3)), pos(player.pos.x + wallDir * 12, player.pos.y + rand(-6, 10)), anchor("center"), color(150, 140, 120), opacity(0.6), lifespan(0.3, { fade: 0.3 }), z(7), { update() { this.move(0, 60); } }]);
            }
          }

          // animation state
          if (time() < lungeUntil) setAnim("jump");
          else if (!player.isGrounded() && !onLadderNow) setAnim("jump");
          else if (Math.abs(dx) > 0.05 || (onLadderNow && (up || down))) setAnim("run");
          else setAnim("idle");
          // stalker ichor drips while moving
          if (CFG.wallClimb && Math.abs(dx) > 0.05 && rand() < 0.12)
            add([circle(rand(1.5, 2.5)), pos(player.pos.add(rand(-8, 8), rand(0, 14))), anchor("center"), color(90, 20, 30), opacity(0.7), lifespan(0.5, { fade: 0.4 }), z(5), { update() { this.move(0, 90); } }]);

          const target = camTarget();
          if (!camReady) { setCamPos(target); camReady = true; } else setCamPos(getCamPos().lerp(target, Math.min(1, dt() * 8)));
          if (player.pos.y > LEVEL_H + 200) hurt(true);
        });

        addOverlay();
      });

      // =====================================================================
      // GAME OVER
      // =====================================================================
      scene("over", ({ win, side, score }) => {
        const s = SIDES[side];
        add([sprite("sky"), pos(0, 0), fixed(), z(-100)]); menuParallax(); addFog(); addDust();
        add([rect(width(), height()), pos(0, 0), fixed(), color(...(win ? [16, 26, 20] : [26, 14, 14])), opacity(0.45), z(-10)]);
        add([sprite(s.sprite, { anim: "idle" }), pos(width() / 2, 130), anchor("center"), scale(2.2)]);
        add([text(win ? "YOU ESCAPED" : "HUNTED DOWN", { size: 54 }), pos(width() / 2, 250), anchor("center"), color(win ? rgb(150, 220, 160) : rgb(220, 110, 100)), outline(4, rgb(20, 18, 16))]);
        add([text(`${s.name}   •   Energy collected: ${score}`, { size: 22 }), pos(width() / 2, 312), anchor("center"), color(210, 200, 186)]);
        add([text("ENTER / A — play again      M — menu", { size: 17 }), pos(width() / 2, 372), anchor("center"), color(160, 150, 134)]);
        addOverlay();
        const again = () => go("game", side);
        onKeyPress("enter", again); onKeyPress("space", again); onGamepadButtonPress("south", again);
        onKeyPress("m", () => go("select")); onGamepadButtonPress("start", () => go("select"));
      });

      onLoad(() => go("select"));
    </script>
  </body>
</html>
