<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QUARRY — a hunter &amp; hunted platformer</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b0d14; overflow: hidden; }
      body { display: flex; align-items: center; justify-content: center; }
      canvas { max-width: 100%; max-height: 100%; }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>
    <script>
      // =====================================================================
      // QUARRY — asymmetric hunter/hunted platformer (inspired by Hunter Hunted)
      // Gritty industrial. Art: inline SVG world + PixelLab character sprites. One self-contained file.
      // =====================================================================
      const k = kaplay({ width: 960, height: 540, letterbox: true, background: [12, 12, 13], global: true, pixelDensity: 1 });
      const TS = 48;
      setGravity(2100);
      const svg = (s) => "data:image/svg+xml," + encodeURIComponent(s);

      // post-processing: film grain + vignette + color grade (#18)
      try {
        loadShader("grade", null, `
          uniform float u_time;
          vec4 frag(vec2 pos, vec2 uv, vec4 color, sampler2D tex) {
            vec4 c = texture2D(tex, uv);
            float l = dot(c.rgb, vec3(0.299, 0.587, 0.114));
            c.rgb = mix(c.rgb * vec3(0.93, 0.97, 1.07), c.rgb * vec3(1.07, 1.01, 0.92), l);
            float d = distance(uv, vec2(0.5, 0.46));
            c.rgb *= 1.0 - 0.4 * smoothstep(0.45, 0.9, d);
            float g = fract(sin(dot(uv + fract(u_time), vec2(12.9898, 78.233))) * 43758.5453);
            c.rgb += (g - 0.5) * 0.045;
            c.rgb *= 0.975 + 0.025 * sin(uv.y * 1696.0);
            return c;
          }`);
        onLoad(() => { try { usePostEffect("grade", () => ({ u_time: time() })); } catch (e) {} setTimeout(() => { try { if (debug.fps() < 30) usePostEffect(null); } catch (e) {} }, 8000); });
      } catch (e) {}

      // credits footer (#27) — DOM so the links are clickable
      (() => {
        const f = document.createElement("div");
        f.style.cssText = "position:fixed;right:10px;bottom:6px;z-index:40;font:11px monospace;color:#8a8272;opacity:0.85";
        f.innerHTML = `Created by <a href="https://x.com/yonidavidson" target="_blank" rel="noopener" style="color:#c8992e;text-decoration:none">Yoni Davidson</a> · <a href="https://github.com/yonidavidson/quarry" target="_blank" rel="noopener" style="color:#c8992e;text-decoration:none">source</a>`;
        document.body.appendChild(f);
      })();

      // favicon (Stalker eyes)
      (() => {
        const l = document.createElement("link");
        l.rel = "icon";
        l.href = svg(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#17130f"/><path d="M6 12 q10 -8 20 0 q2 9 -4 15 q-6 4 -12 0 q-6 -6 -4 -15z" fill="#3a2a2c"/><circle cx="21" cy="15" r="3" fill="#e8b13a"/><circle cx="12" cy="17" r="2.4" fill="#e8b13a"/></svg>`);
        document.head.appendChild(l);
      })();

      // =====================================================================
      // ART
      // =====================================================================
      loadSprite("sky", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540"><defs><linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0c0d0b"/><stop offset="48%" stop-color="#111310"/><stop offset="100%" stop-color="#000000"/></linearGradient></defs><rect width="960" height="540" fill="url(#s)"/></svg>`));

      loadSprite("bgFar", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220"><g fill="#20242a"><rect x="18" y="90" width="42" height="130"/><rect x="70" y="120" width="26" height="100"/><rect x="112" y="64" width="26" height="156"/><rect x="150" y="108" width="52" height="112"/><rect x="212" y="78" width="22" height="142"/><rect x="246" y="128" width="60" height="92"/><rect x="322" y="96" width="34" height="124"/><rect x="362" y="54" width="18" height="166"/><rect x="390" y="116" width="72" height="104"/></g><g fill="#e8b13a" opacity="0.45"><rect x="120" y="84" width="4" height="6"/><rect x="222" y="96" width="4" height="6"/><rect x="366" y="72" width="4" height="6"/></g></svg>`));

      // interior back-wall panel (tiled across the whole level)
            // ===== TEXTURE BAKER (#43): pre-rendered-look bitmaps, HH-style =====
      const tRand = (() => { let s = 987654321; return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; }; })();
      function bake(w, h, paint) {
        const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
        const ctx = cv.getContext("2d"); paint(ctx, w, h);
        return cv.toDataURL("image/png");
      }
      function addNoise(ctx, w, h, amt) {
        const img = ctx.getImageData(0, 0, w, h), d = img.data;
        for (let i = 0; i < d.length; i += 4) { const n = (tRand() - 0.5) * amt; d[i] += n; d[i + 1] += n; d[i + 2] += n * 0.85; }
        ctx.putImageData(img, 0, 0);
      }
      function grunge(ctx, w, h, n, colA, colB) {
        for (let i = 0; i < n; i++) {
          const x = tRand() * w, y = tRand() * h, r = 5 + tRand() * (w / 3.5);
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, (tRand() < 0.6 ? colA : colB) + (0.05 + tRand() * 0.13) + ")");
          g.addColorStop(1, (tRand() < 0.6 ? colA : colB) + "0)");
          ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        }
      }
      function cracks(ctx, w, h, n) {
        ctx.strokeStyle = "rgba(6,8,4,0.45)"; ctx.lineWidth = 1;
        for (let i = 0; i < n; i++) {
          let x = tRand() * w, y = tRand() * h * 0.5;
          ctx.beginPath(); ctx.moveTo(x, y);
          for (let s2 = 0; s2 < 8; s2++) { x += (tRand() - 0.5) * 12; y += tRand() * 9; ctx.lineTo(x, y); }
          ctx.stroke();
        }
      }
      function wallTexture(variant) {
        return bake(128, 128, (ctx, w, h) => {
          ctx.fillStyle = variant ? "#1b201a" : "#1e231d"; ctx.fillRect(0, 0, w, h);
          for (let i = 0; i < 9; i++) { // carved organic relief: shadow, mass, top-light
            const x = tRand() * w, y = tRand() * h, rx = 12 + tRand() * 26, ry = 8 + tRand() * 18;
            ctx.fillStyle = "rgba(8,10,7,0.55)";
            ctx.beginPath(); ctx.ellipse(x + 3, y + 4, rx, ry, tRand() * 3, 0, 7); ctx.fill();
            ctx.fillStyle = `rgba(${44 + tRand() * 14},${52 + tRand() * 14},${40 + tRand() * 12},0.9)`;
            ctx.beginPath(); ctx.ellipse(x, y, rx, ry, tRand() * 3, 0, 7); ctx.fill();
            ctx.strokeStyle = "rgba(86,100,74,0.5)"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(x - 1, y - 2, rx * 0.8, ry * 0.7, tRand() * 3, 3.4, 5.9); ctx.stroke();
          }
          if (variant) { // drain grate on the variant
            ctx.fillStyle = "#0e110c"; ctx.fillRect(76, 14, 38, 24);
            ctx.strokeStyle = "#2e352a"; ctx.lineWidth = 2;
            for (let gx2 = 82; gx2 < 112; gx2 += 7) { ctx.beginPath(); ctx.moveTo(gx2, 17); ctx.lineTo(gx2, 35); ctx.stroke(); }
            ctx.fillStyle = "rgba(6,8,4,0.5)"; ctx.fillRect(88, 38, 8, 34);
          }
          grunge(ctx, w, h, 26, "rgba(9,11,7,", "rgba(96,112,82,");
          cracks(ctx, w, h, 5);
          addNoise(ctx, w, h, 26);
        });
      }
      function brickTexture(leftCap, rightCap) {
        return bake(48, 48, (ctx, w, h) => {
          ctx.fillStyle = "#141810"; ctx.fillRect(0, 0, w, h);
          const rows = [[0, [[1, 22], [25, 22]]], [16, [[1, 10], [13, 22], [37, 10]]], [32, [[1, 22], [25, 22]]]];
          for (const [by, bricks] of rows) for (const [bx, bw] of bricks) {
            const t = tRand() * 14 - 7;
            ctx.fillStyle = `rgb(${58 + t},${68 + t},${47 + t * 0.8})`;
            ctx.fillRect(bx, by + 1, bw, 13);
            ctx.fillStyle = `rgba(${92 + t},${108 + t},${72 + t},0.9)`; ctx.fillRect(bx, by + 1, bw, 3); // bevel top
            ctx.fillStyle = "rgba(16,20,10,0.7)"; ctx.fillRect(bx, by + 11, bw, 3); // bevel bottom
            if (tRand() < 0.5) { ctx.fillStyle = "rgba(10,12,6,0.35)"; ctx.fillRect(bx + tRand() * bw * 0.6, by + 3, 3 + tRand() * 6, 7); } // chips
          }
          ctx.fillStyle = "#78905a"; for (let i = 0; i < 7; i++) { if (tRand() < 0.8) ctx.fillRect(tRand() * w, tRand() * 6, 2, 2); } // moss on the lip
          ctx.fillStyle = "rgba(140,160,105,0.8)"; ctx.fillRect(0, 0, w, 2); // top light
          if (leftCap) { ctx.fillStyle = "#5d6a48"; ctx.fillRect(0, 0, 4, h); ctx.fillStyle = "rgba(8,10,5,0.8)"; ctx.fillRect(4, 0, 2, h); }
          if (rightCap) { ctx.fillStyle = "#5d6a48"; ctx.fillRect(w - 4, 0, 4, h); ctx.fillStyle = "rgba(8,10,5,0.8)"; ctx.fillRect(w - 6, 0, 2, h); }
          grunge(ctx, w, h, 10, "rgba(9,11,6,", "rgba(110,128,84,");
          addNoise(ctx, w, h, 22);
        });
      }
      loadSprite("wall", wallTexture(false));

      loadSprite("wall2", wallTexture(true));
      loadSprite("girder", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="128"><rect x="4" width="18" height="128" fill="#2b2f33"/><rect x="4" width="4" height="128" fill="#3a3f44"/><rect x="18" width="4" height="128" fill="#1e2124"/><g fill="#15171a"><circle cx="13" cy="12" r="2"/><circle cx="13" cy="44" r="2"/><circle cx="13" cy="76" r="2"/><circle cx="13" cy="108" r="2"/></g></svg>`));

      loadSprite("pipeV", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="48"><rect x="4" width="12" height="48" fill="#3a3f44"/><rect x="4" width="4" height="48" fill="#4a5055"/><rect x="13" width="3" height="48" fill="#22262a"/><rect x="1" y="20" width="18" height="8" rx="2" fill="#2b3034"/></svg>`));

      // platform tiles: neighbor-aware variants (M mid, L/R caps, S single) — kills repetition (#18)
      loadSprite("tileM", brickTexture(false, false));
      loadSprite("tileL", brickTexture(true, false));
      loadSprite("tileR", brickTexture(false, true));
      loadSprite("tileS", brickTexture(true, true));
      loadSprite("bracket", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"><path d="M2 0 L24 0 L2 24 Z" fill="#2e3338"/><path d="M2 0 L24 0 L2 24" stroke="#454c52" stroke-width="2" fill="none"/><circle cx="7" cy="6" r="2" fill="#1c2023"/></svg>`));
      loadSprite("stain", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="60" height="44"><defs><radialGradient id="st" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#0c0d0f" stop-opacity="0.55"/><stop offset="100%" stop-color="#0c0d0f" stop-opacity="0"/></radialGradient></defs><ellipse cx="30" cy="20" rx="30" ry="20" fill="url(#st)"/><path d="M22 30 q2 10 1 13 M34 32 q1 8 3 11" stroke="#0c0d0f" stroke-width="3" opacity="0.35" fill="none"/></svg>`));
      loadSprite("pipeH", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="192" height="18"><rect y="3" width="192" height="10" fill="#2c3136"/><rect y="3" width="192" height="3" fill="#3d444a"/><rect y="11" width="192" height="2" fill="#1b1f23"/><g fill="#24292e"><rect x="30" width="8" height="18" rx="2"/><rect x="110" width="8" height="18" rx="2"/><rect x="170" width="8" height="18" rx="2"/></g><path d="M70 13 q2 6 1 9" stroke="#5e3d24" stroke-width="2" opacity="0.5" fill="none"/></svg>`));
      loadSprite("depthfog", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="8" height="540"><defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="55%" stop-color="#000" stop-opacity="0.08"/><stop offset="100%" stop-color="#0a0806" stop-opacity="0.42"/></linearGradient></defs><rect width="8" height="540" fill="url(#dg)"/></svg>`));

      loadSprite("ladder", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect x="10" width="5" height="48" fill="#4a4030"/><rect x="33" width="5" height="48" fill="#4a4030"/><g fill="#5a4f3a"><rect x="10" y="5" width="28" height="4"/><rect x="10" y="21" width="28" height="4"/><rect x="10" y="37" width="28" height="4"/></g><g fill="#2e281c"><rect x="10" y="5" width="28" height="1"/><rect x="10" y="21" width="28" height="1"/><rect x="10" y="37" width="28" height="1"/></g></svg>`));

      // climbable chain-net (free 2D climb, like the HH net towers)
      loadSprite("net", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">
        <g stroke="#6a5a40" stroke-width="2.2">
          <path d="M0 0 L48 48 M16 0 L48 32 M32 0 L48 16 M0 16 L32 48 M0 32 L16 48"/>
          <path d="M48 0 L0 48 M32 0 L0 32 M16 0 L0 16 M48 16 L16 48 M48 32 L32 48"/>
        </g>
        <g stroke="#3a3222" stroke-width="1" opacity="0.8">
          <path d="M0 0 L48 48 M48 0 L0 48"/>
        </g>
        <rect x="0" width="3" height="48" fill="#4a4030"/><rect x="45" width="3" height="48" fill="#4a4030"/></svg>`));

      // glowing EXIT sign
      loadSprite("exitsign", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="56" height="26">
        <rect x="2" y="2" width="52" height="22" rx="3" fill="#0d1a12" stroke="#1e3a28" stroke-width="2"/>
        <rect x="4" y="4" width="48" height="18" rx="2" fill="#123020" opacity="0.9"/>
        <text x="28" y="18" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#7ef0a0">EXIT</text>
      </svg>`));

      loadSprite("door", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="44" height="70"><path d="M2 70 L2 26 Q2 4 22 4 Q42 4 42 26 L42 70 Z" fill="#4a5340"/><path d="M7 70 L7 28 Q7 10 22 10 Q37 10 37 28 L37 70 Z" fill="#0c0e0a"/><g stroke="#6a745a" stroke-width="2.6"><line x1="13" y1="16" x2="13" y2="70"/><line x1="19" y1="12" x2="19" y2="70"/><line x1="25" y1="12" x2="25" y2="70"/><line x1="31" y1="16" x2="31" y2="70"/></g><rect x="7" y="38" width="30" height="4" fill="#57644a"/><g fill="#2c3324"><rect x="0" y="64" width="6" height="6"/><rect x="38" y="64" width="6" height="6"/><rect x="1" y="30" width="5" height="5"/><rect x="38" y="30" width="5" height="5"/></g><ellipse cx="22" cy="36" rx="12" ry="22" fill="#e8b13a" opacity="0.10"/></svg>`));

      loadSprite("spikes", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="24"><rect y="18" width="48" height="6" fill="#2f3436"/><g fill="#5a5f61" stroke="#20242a" stroke-width="1"><path d="M2 22 L8 3 L14 22 z"/><path d="M14 22 L20 3 L26 22 z"/><path d="M26 22 L32 3 L38 22 z"/><path d="M38 22 L44 3 L48 22 z"/></g><g stroke="#7a4a28" stroke-width="1" opacity="0.5"><path d="M8 6 l0 12"/><path d="M32 6 l0 12"/></g></svg>`));

      loadSprite("cell", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28"><circle cx="11" cy="15" r="10" fill="#5ee08a" opacity="0.16"/><rect x="8" y="0" width="6" height="4" fill="#3a3d3f"/><rect x="4" y="3" width="14" height="23" rx="3" fill="#2c2f31" stroke="#1c1f21"/><rect x="7" y="7" width="8" height="15" rx="2" fill="#3aa06a"/><rect x="7" y="7" width="8" height="6" rx="2" fill="#7ee0a0" opacity="0.5"/></svg>`));

      loadSprite("medkit", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="22"><circle cx="12" cy="11" r="10" fill="#ff6a5a" opacity="0.15"/><rect x="3" y="6" width="18" height="13" rx="2" fill="#3a4232" stroke="#1e241a"/><rect x="3" y="6" width="18" height="4" fill="#4a5340"/><rect x="9" y="3" width="6" height="4" rx="1" fill="#2c3324"/><rect x="8" y="9" width="8" height="8" rx="1" fill="#e8e4da"/><rect x="11" y="10" width="2" height="6" fill="#c23b2e"/><rect x="9" y="12" width="6" height="2" fill="#c23b2e"/></svg>`));

      loadSprite("exit", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="72"><rect x="4" y="2" width="40" height="70" rx="3" fill="#2c3033"/><rect x="8" y="6" width="32" height="62" fill="#3c4144" stroke="#20242a" stroke-width="2"/><g opacity="0.85"><path d="M11 62 l20 -22" stroke="#c8992e" stroke-width="5"/><path d="M20 64 l14 -16" stroke="#1c1c1c" stroke-width="5"/></g><circle cx="24" cy="18" r="10" fill="#e8b13a" opacity="0.3"/><circle cx="24" cy="18" r="5" fill="#f0c04a"/></svg>`));

      // drone: 2-frame strip (rotor flicker + eye pulse)
      const droneFrame = (alt) => `
        <rect x="${alt ? 3 : 1}" y="6" width="${alt ? 5 : 9}" height="3" fill="#3a3d3f" opacity="${alt ? 0.6 : 1}"/>
        <rect x="${alt ? 28 : 26}" y="6" width="${alt ? 5 : 9}" height="3" fill="#3a3d3f" opacity="${alt ? 0.6 : 1}"/>
        ${alt ? '<rect x="0" y="6" width="36" height="3" fill="#3a3d3f" opacity="0.25"/>' : ""}
        <path d="M7 10 h22 q5 7 -2 15 h-18 q-7 -8 -2 -15z" fill="#45494b"/>
        <rect x="7" y="10" width="22" height="4" fill="#565b5d"/>
        <path d="M11 13 l-1 12" stroke="#6b4527" stroke-width="2" opacity="0.5"/>
        <circle cx="18" cy="19" r="5.5" fill="#7a1e1e"/><circle cx="18" cy="19" r="${alt ? 3.2 : 2.6}" fill="#ef4444"/>
        <g fill="#232527"><circle cx="9" cy="20" r="1.5"/><circle cx="27" cy="20" r="1.5"/></g>`;
      loadSprite("drone", svg(`<svg xmlns="http://www.w3.org/2000/svg" width="72" height="34">
        <g>${droneFrame(false)}</g><g transform="translate(36 0)">${droneFrame(true)}</g></svg>`),
        { sliceX: 2, anims: { spin: { from: 0, to: 1, speed: 9, loop: true } } });

      // character relight baker (#45): per-pixel top-light, warm rim, shadow edges, grain
      function relightStrip(srcURL) {
        return new Promise((res) => {
          const img = new Image();
          img.onload = () => {
            const W2 = img.width, H2 = img.height;
            const cv = document.createElement("canvas"); cv.width = W2; cv.height = H2;
            const ctx = cv.getContext("2d"); ctx.drawImage(img, 0, 0);
            const im = ctx.getImageData(0, 0, W2, H2), d = im.data;
            const alpha = new Uint8Array(W2 * H2);
            for (let i = 0; i < W2 * H2; i++) alpha[i] = d[i * 4 + 3];
            const A = (x, y) => (x < 0 || y < 0 || x >= W2 || y >= H2 ? 0 : alpha[y * W2 + x]);
            for (let y = 0; y < H2; y++) for (let x = 0; x < W2; x++) {
              const idx = y * W2 + x; if (alpha[idx] < 40) continue;
              const i4 = idx * 4;
              const l = 1.07 - (y / H2) * 0.24, n = (tRand() - 0.5) * 12;
              let r2 = d[i4] * l + n, g2 = d[i4 + 1] * l + n, b2 = d[i4 + 2] * l * 0.97 + n * 0.8;
              if (A(x - 1, y - 1) < 40 || A(x - 2, y - 2) < 40) { r2 += 62; g2 += 50; b2 += 32; }
              else if (A(x + 1, y + 1) < 40) { r2 *= 0.6; g2 *= 0.6; b2 *= 0.64; }
              d[i4] = r2 > 255 ? 255 : r2; d[i4 + 1] = g2 > 255 ? 255 : g2; d[i4 + 2] = b2 > 255 ? 255 : b2;
            }
            ctx.putImageData(im, 0, 0);
            res(cv.toDataURL("image/png"));
          };
          img.onerror = () => res(srcURL); // fall back to the raw strip
          img.src = srcURL;
        });
      }
      // ===== JACK v5 (#47): PixelLab pre-rendered commando — 108x141/frame, 19 frames =====

        hurt: () => { noise({ dur: 0.3, vol: 0.32, type: "lowpass", f0: 420, f1: 90 }); tone({ f0: 150, f1: 55, dur: 0.25, type: "sawtooth", vol: 0.12 }); },

        warp: () => { [500, 700, 980].forEach((f, i) => tone({ f0: f, dur: 0.1, vol: 0.08, type: "sine", delay: i * 0.07 })); noise({ dur: 0.3, vol: 0.05, type: "highpass", f0: 3200 }); },
        win: () => [440, 587, 698, 880].forEach((f, i) => { tone({ f0: f, dur: i === 3 ? 0.35 : 0.12, vol: 0.1, type: "triangle", delay: i * 0.11 }); tone({ f0: f * 1.5, dur: 0.1, vol: 0.04, type: "sine", delay: i * 0.11 }); }),
        lose: () => [330, 262, 196].forEach((f, i) => tone({ f0: f, dur: i === 2 ? 0.4 : 0.16, vol: 0.12, type: i === 2 ? "sawtooth" : "square", delay: i * 0.15 })),
        step: (alt) => noise({ dur: 0.07, vol: 0.06, type: "lowpass", f0: alt ? 620 : 740, wet: false }),
        land: (h) => noise({ dur: 0.16, vol: 0.1 + h * 0.2, type: "lowpass", f0: 500, f1: 120 }),
        heart: (close) => { tone({ f0: 52, f1: 38, dur: 0.1, type: "sine", vol: close ? 0.3 : 0.2, wet: false }); tone({ f0: 44, f1: 32, dur: 0.14, type: "sine", vol: close ? 0.2 : 0.12, delay: 0.12, wet: false }); },
        splash: () => { noise({ dur: 0.28, vol: 0.22, type: "lowpass", f0: 900, f1: 180 }); noise({ dur: 0.12, vol: 0.1, type: "highpass", f0: 2200 }); },
        slosh: () => noise({ dur: 0.12, vol: 0.1, type: "lowpass", f0: 380, f1: 160, wet: false }),
        plink: () => { tone({ f0: 1150 + Math.random() * 500, f1: 700, dur: 0.12, type: "sine", vol: 0.05 }); },
        shotgunS: () => { noise({ dur: 0.32, vol: 0.42, type: "lowpass", f0: 1100, f1: 120 }); tone({ f0: 110, f1: 40, dur: 0.25, type: "square", vol: 0.16 }); noise({ dur: 0.08, vol: 0.12, type: "bandpass", f0: 1400, Q: 5, delay: 0.34 }); noise({ dur: 0.07, vol: 0.1, type: "bandpass", f0: 900, Q: 5, delay: 0.44 }); },
        mgunS: () => { noise({ dur: 0.08, vol: 0.2, type: "bandpass", f0: 2100, f1: 500, Q: 1.6 }); tone({ f0: 400, f1: 120, dur: 0.05, type: "sawtooth", vol: 0.07 }); },
        batS: () => { noise({ dur: 0.2, vol: 0.16, type: "bandpass", f0: 340, f1: 90, Q: 1 }); },
        whipS: () => { noise({ dur: 0.05, vol: 0.28, type: "highpass", f0: 1800 }); noise({ dur: 0.14, vol: 0.12, type: "bandpass", f0: 700, f1: 200, delay: 0.04 }); },
        thunk: () => { noise({ dur: 0.14, vol: 0.24, type: "lowpass", f0: 320, f1: 90 }); tone({ f0: 95, f1: 45, dur: 0.14, type: "triangle", vol: 0.14 }); },
        roar: () => { tone({ f0: 90, f1: 42, dur: 0.9, type: "sawtooth", vol: 0.28 }); noise({ dur: 0.85, vol: 0.22, type: "lowpass", f0: 600, f1: 140 }); tone({ f0: 140, f1: 60, dur: 0.7, type: "square", vol: 0.1, delay: 0.08 }); },
        crossbowS: () => { noise({ dur: 0.06, vol: 0.14, type: "bandpass", f0: 900, Q: 3 }); noise({ dur: 0.18, vol: 0.06, type: "highpass", f0: 2000, f1: 800 }); },
        flamerS: () => noise({ dur: 0.14, vol: 0.14, type: "lowpass", f0: 900, f1: 500, wet: false }),
        spineS: () => { noise({ dur: 0.14, vol: 0.14, type: "bandpass", f0: 600, f1: 250, Q: 1.4 }); noise({ dur: 0.1, vol: 0.08, type: "highpass", f0: 1600, delay: 0.03 }); },
        clunk: () => { noise({ dur: 0.2, vol: 0.26, type: "lowpass", f0: 400, f1: 100 }); tone({ f0: 120, f1: 60, dur: 0.22, type: "square", vol: 0.12 }); noise({ dur: 0.3, vol: 0.1, type: "bandpass", f0: 1800, Q: 8, delay: 0.12 }); },
      };
      // clip-first (#49/#58): EVERY cue prefers its ElevenLabs clip, synth as fallback.
      // Slight per-play rate variance keeps repeated cues organic.
      const CLIP_MAP = {
        jump: ["jump", 0.28], jump2: ["jump2", 0.28], shoot: ["shot", 0.32], scatterS: ["scatter", 0.42], rail: ["rail", 0.42],
        shotgunS: ["shotgun", 0.5], mgunS: ["mgun", 0.28], crossbowS: ["crossbow", 0.35], flamerS: ["flame", 0.16], spineS: ["spines", 0.35],
        claw: ["claw", 0.4], whipS: ["whip", 0.42], batS: ["bat", 0.42], thunk: ["thunk", 0.45], clunk: ["clunk", 0.5],
        boom: ["boom", 0.62], splash: ["splash", 0.42], slosh: ["slosh", 0.3], pickup: ["pickup", 0.32], plink: ["plink", 0.24],
        toss: ["toss", 0.3], warp: ["warp", 0.5], win: ["win", 0.5], lose: ["lose", 0.5], kill: ["kill", 0.5], hurt: ["hurt", 0.5], roar: ["roar", 0.7],
      };
      for (const [k, [clip, vol]] of Object.entries(CLIP_MAP)) {
        const orig = SFX[k]; if (!orig) continue;
        SFX[k] = (...a2) => { if (!sndPlay(clip, { vol, rate: 0.94 + Math.random() * 0.12, wet: true })) orig(...a2); };
      }
      const _oHeart = SFX.heart; SFX.heart = (close) => { if (!sndPlay("heart", { vol: close ? 0.5 : 0.3, rate: close ? 1.12 : 1 })) _oHeart(close); };
      const _oStep = SFX.step; SFX.step = (alt) => { if (!sndPlay("step", { vol: 0.14, rate: alt ? 1.08 : 0.94 })) _oStep(alt); };
      const _oLand = SFX.land; SFX.land = (h) => { if (!sndPlay("land", { vol: 0.18 + Math.min(h || 0.3, 0.8) * 0.4, wet: true })) _oLand(h); };

      // =====================================================================
      // PARTICLES / FX
      // =====================================================================
      function burst(p, col, n = 12, spd = 220, sz = 7) {
        for (let i = 0; i < n; i++) {
          const v = vec2(rand(-1, 1), rand(-1, 1)).unit().scale(rand(spd * 0.35, spd));
          add([rect(rand(sz * 0.5, sz), rand(sz * 0.5, sz)), pos(p), anchor("center"), color(col), rotate(rand(0, 360)), opacity(1), lifespan(0.5, { fade: 0.4 }), z(40), { v, update() { this.move(this.v); this.v = this.v.scale(0.9); this.v.y += 700 * dt(); } }]);
        }
      }
      function dust(p) {
        for (let i = 0; i < 7; i++) {
          const v = vec2(rand(-1, 1), rand(-1.1, -0.15)).unit().scale(rand(50, 140));
          add([circle(rand(2, 4)), pos(p.add(rand(-10, 10), 0)), anchor("center"), color(150, 140, 120), opacity(0.7), lifespan(0.4, { fade: 0.35 }), z(38), { v, update() { this.move(this.v); this.v = this.v.scale(0.9); } }]);
        }
      }
      function popText(p, str, col) {
        add([text(str, { size: 20 }), pos(p), anchor("center"), color(col), outline(3, rgb(0, 0, 0)), opacity(1), lifespan(0.6, { fade: 0.5 }), z(170), { update() { this.move(0, -46); } }]);
      }
      function flash(col, a = 0.45) { add([rect(width(), height()), pos(0, 0), fixed(), color(col), opacity(a), lifespan(0.35, { fade: 0.35 }), z(190)]); }

      // =====================================================================
      // ATMOSPHERE
      // =====================================================================
      const wrapv = (v, m) => ((v % m) + m) % m;
      function addFog() {
        for (let i = 0; i < 3; i++) {
          const f = add([sprite("fog"), pos(rand(0, width()), rand(120, 380)), fixed(), z(-60), opacity(rand(0.35, 0.7)), { spd: rand(6, 16) }]);
          f.onUpdate(() => { f.pos.x += f.spd * dt(); if (f.pos.x > width() + 320) f.pos.x = -620; });
        }
      }
      function addDust() {
        loop(0.22, () => add([rect(rand(1, 3), rand(1, 3)), pos(rand(0, width()), height() + 6), fixed(), color(205, 175, 125), opacity(rand(0.1, 0.32)), z(-50), lifespan(rand(6, 10), { fade: 2 }), { drift: rand(-8, 8), up: rand(10, 24), update() { this.pos.x += this.drift * dt(); this.pos.y -= this.up * dt(); } }]));
      }
      function menuParallax() {
        const w = 480;
        const count = Math.ceil(width() / w) + 2;
        const tiles = [];
        for (let i = 0; i < count; i++) tiles.push(add([sprite("bgFar"), pos(i * w, 150), fixed(), z(-90), opacity(0.85)]));
        onUpdate(() => { const off = wrapv(time() * 6, w); tiles.forEach((o, i) => (o.pos.x = i * w - off)); });
      }
      function addOverlay() { add([sprite("vignette"), pos(0, 0), fixed(), z(150)]); }

      // =====================================================================
      // SIDES
      // =====================================================================
      // =====================================================================
      // NET (issue #11): WebRTC 2P — manual code exchange, Google STUN
      // =====================================================================
      const NET = { pc: null, dc: null, role: null, mySide: null, connected: false, onMsg: null, ping: 0, peerName: null, lastPacketAt: 0, series: { me: 0, them: 0 } };
      const CHAT = { lines: [], push(name, text) { this.lines.push({ name, text, at: Date.now() }); if (this.lines.length > 4) this.lines.shift(); } };
      const b64e = (s) => btoa(unescape(encodeURIComponent(s)));
      const b64d = (s) => decodeURIComponent(escape(atob(s.trim())));
      const iceDone = (pc) => new Promise((res) => {
        if (pc.iceGatheringState === "complete") return res();
        pc.addEventListener("icegatheringstatechange", () => pc.iceGatheringState === "complete" && res());
        setTimeout(res, 6500); // STUN/TURN can stall; ship what we have
      });
      function netSend(o) { if (NET.dc && NET.dc.readyState === "open") NET.dc.send(JSON.stringify(o)); }
      async function detectPath(pc) { // which route did ICE pick? (#44)
        try {
          const stats = await pc.getStats();
          const m = {}; let pairId = null;
          stats.forEach((s) => { m[s.id] = s; if (s.type === "transport" && s.selectedCandidatePairId) pairId = s.selectedCandidatePairId; });
          if (!pairId) stats.forEach((s) => { if (!pairId && s.type === "candidate-pair" && (s.selected || s.state === "succeeded")) pairId = s.id; });
          const pair = m[pairId]; if (!pair) return;
          const loc = m[pair.localCandidateId], rem = m[pair.remoteCandidateId];
          NET.path = (loc && loc.candidateType === "relay") || (rem && rem.candidateType === "relay") ? "RELAY (slower route)" : "direct";
        } catch (e) {}
      }
      function netStatus(txt, good) { const el = document.getElementById("netStat"); if (el) { el.textContent = txt; el.style.color = good ? "#8fe0a0" : "#e0b080"; } }
      function watchConn(pc) {
        pc.onconnectionstatechange = () => {
          const s = pc.connectionState;
          netStatus(s === "connected" ? "✔ Connected! Starting the hunt…" : s === "connecting" ? "Connecting…" : s === "failed" ? "✗ Connection failed — regenerate codes and retry (check both windows are visible)" : "State: " + s, s === "connected");
        };
      }
      function wireDC(dc) {
        dc.onopen = () => {
          NET.connected = true;
          NET.series = { me: 0, them: 0 }; // fresh link = fresh series (#48)
          setTimeout(() => detectPath(NET.pc), 1200); // direct vs relay (#44)
          if (NET.role === "host") { netSend({ t: "hello", side: NET.mySide, name: PLAYER_NAME }); netUIHide(); go("game", NET.mySide); }
        };
        dc.onmessage = (e) => {
          const m = JSON.parse(e.data);
          NET.lastPacketAt = performance.now();
          if (m.t === "hello") { NET.peerName = m.name || "Opponent"; NET.mySide = m.side === "human" ? "stalker" : "human"; netSend({ t: "hi", name: PLAYER_NAME }); netUIHide(); go("game", NET.mySide); }
          else if (m.t === "hi") NET.peerName = m.name || "Opponent";
          else if (m.t === "ping") netSend({ t: "pong", ts: m.ts });
          else if (m.t === "pong") NET.ping = Math.round(performance.now() - m.ts);
          else if (m.t === "chat") CHAT.push(NET.peerName || "Them", ("" + m.text).slice(0, 90));
          if (NET.onMsg) NET.onMsg(m);
        };
        dc.onclose = () => { NET.connected = false; };
      }
      // player name (#24): persisted, defaults to fun codename
      let PLAYER_NAME = "";
      function setPlayerName(n) { PLAYER_NAME = (n || "").trim().slice(0, 16) || PLAYER_NAME; try { localStorage.setItem("quarry-name", PLAYER_NAME); } catch (e) {} }
      // STUN alone can't traverse symmetric NAT — include a free TURN relay (#29)
      const ICE_SERVERS = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: ["turn:standard.relay.metered.ca:80", "turn:standard.relay.metered.ca:443", "turns:standard.relay.metered.ca:443?transport=tcp"], username: "openrelayproject", credential: "openrelayproject" },
      ];
      function iceDiag(pc) { // count candidate types for the wizard status line
        const types = { host: 0, srflx: 0, relay: 0 };
        pc.addEventListener("icecandidate", (e) => {
          if (e.candidate) { const t = /typ (\w+)/.exec(e.candidate.candidate); if (t && types[t[1]] !== undefined) types[t[1]]++; }
          else { const el = document.getElementById("netDiag"); if (el) el.textContent = `network paths: direct×${types.host} public×${types.srflx} relay×${types.relay}${types.relay === 0 ? " (no relay — tough NATs may fail)" : ""}`; }
        });
        pc.addEventListener("iceconnectionstatechange", () => {
          if (pc.iceConnectionState === "failed") netStatus("✗ Couldn't punch through between your networks. Both players: regenerate fresh codes and retry.", false);
        });
      }
      async function netHost(side) {
        NET.role = "host"; NET.mySide = side;
        const pc = (NET.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS }));
        iceDiag(pc);
        watchConn(pc);
        wireDC((NET.dc = pc.createDataChannel("game")));
        await pc.setLocalDescription(await pc.createOffer());
        await iceDone(pc);
        return b64e(JSON.stringify(pc.localDescription));
      }
      async function netHostAccept(answerCode) { await NET.pc.setRemoteDescription(JSON.parse(b64d(answerCode))); }
      async function netJoin(offerCode) {
        NET.role = "guest";
        const pc = (NET.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS }));
        iceDiag(pc);
        watchConn(pc);
        pc.ondatachannel = (e) => wireDC((NET.dc = e.channel));
        await pc.setRemoteDescription(JSON.parse(b64d(offerCode)));
        await pc.setLocalDescription(await pc.createAnswer());
        await iceDone(pc);
        return b64e(JSON.stringify(pc.localDescription));
      }
      // DOM overlay for code exchange (canvas text input is miserable)
      function netUI(html) {
        let d = document.getElementById("netui");
        if (!d) {
          d = document.createElement("div"); d.id = "netui"; document.body.appendChild(d);
          d.style.cssText = "position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,8,10,0.88);z-index:50;font-family:monospace;color:#e6dcc8";
        }
        d.style.display = "flex";
        d.innerHTML = `<div style="max-width:640px;width:92%;background:#191a1e;border:2px solid #55503f;border-radius:12px;padding:24px">${html}</div>`;
      }
      function netUIHide() { const d = document.getElementById("netui"); if (d) d.style.display = "none"; refocusGame(); }
      // keyboard lives on the canvas — refocus it whenever DOM steals focus (#17)
      function refocusGame() { const c = document.querySelector("canvas"); if (c) { c.setAttribute("tabindex", "0"); c.focus(); } }
      document.addEventListener("pointerdown", () => { const n = document.getElementById("netui"); if (!n || n.style.display === "none") setTimeout(refocusGame, 0); });
      window.addEventListener("focus", () => { const n = document.getElementById("netui"); if (!n || n.style.display === "none") refocusGame(); });
      const NETSTYLE = `style="width:100%;height:86px;background:#0e0f12;color:#cfc8b0;border:1px solid #444;border-radius:6px;margin:6px 0;font-family:monospace;font-size:11px"`;
      const NETBTN = `style="background:#c8992e;color:#141414;border:none;border-radius:6px;padding:8px 16px;font-family:monospace;font-weight:bold;cursor:pointer;margin-right:8px"`;
      const NETWARN = `<div style="background:#3a2a14;border:1px solid #7a5a24;border-radius:6px;padding:8px 10px;margin:8px 0;font-size:12px;color:#e0c890">⚠ Testing with two windows on ONE computer? Keep <b>both windows visible side-by-side</b> — a hidden tab pauses its game and pairing looks stuck.</div>`;
      const NAMEROW = () => `<p style="margin:6px 0 2px">Your name:</p><input id="nameIn" value="${PLAYER_NAME.replace(/"/g, "")}" maxlength="16" style="width:180px;background:#0e0f12;color:#e6dcc8;border:1px solid #444;border-radius:6px;padding:6px;font-family:monospace"/>`;
      window.__copyBtn = (btn, sel) => { navigator.clipboard.writeText(document.querySelector(sel).value); btn.textContent = "Copied ✔"; setTimeout(() => (btn.textContent = "Copy"), 1500); };
      window.__netHostStart = async (side) => {
        setPlayerName(document.getElementById("nameIn") ? document.getElementById("nameIn").value : PLAYER_NAME);
        netUI(`<h3>HOSTING as ${side === "human" ? "JACK" : "the BEAST"} — ${PLAYER_NAME}</h3>${NETWARN}<p>Generating your invite code…</p><p id="netStat"></p>`);
        const code = await netHost(side);
        netUI(`<h3>HOSTING as ${side === "human" ? "JACK" : "the BEAST"} — ${PLAYER_NAME}</h3>${NETWARN}
          <p><b>STEP 1.</b> Send this INVITE code to your friend (WhatsApp, Slack, anything):</p>
          <textarea ${NETSTYLE} id="offOut" readonly onclick="this.select()">${code}</textarea>
          <button ${NETBTN} onclick="__copyBtn(this,'#offOut')">Copy</button>
          <p><b>STEP 2.</b> They will send you back an ANSWER code. Paste it here:</p>
          <textarea ${NETSTYLE} id="ansIn" placeholder="paste answer code…"></textarea>
          <button ${NETBTN} onclick="__netHostFinish()">STEP 3 — Connect</button>
          <button ${NETBTN} onclick="__netCancel()">Cancel</button>
          <p id="netStat">Waiting for their answer code…</p><p id="netDiag" style="font-size:11px;color:#8a8272"></p>`);
      };
      window.__netHostFinish = async () => {
        const v = document.getElementById("ansIn").value.trim();
        if (!v) return netStatus("Paste their answer code first.");
        try {
          netStatus("Connecting…"); await netHostAccept(v);
          setTimeout(() => { if (!NET.connected) netStatus("✗ Not connected after 20s — tough network. Both players regenerate fresh codes and retry; the relay usually catches on the second try.", false); }, 20000);
        } catch (e) { netStatus("✗ That doesn't look like an answer code (" + e.message + ")"); }
      };
      window.__netJoinStart = () => {
        setPlayerName(document.getElementById("nameIn") ? document.getElementById("nameIn").value : PLAYER_NAME);
        netUI(`<h3>JOINING a hunt — ${PLAYER_NAME}</h3>${NETWARN}
          <p><b>STEP 1.</b> Paste the INVITE code your friend sent you:</p>
          <textarea ${NETSTYLE} id="offIn" placeholder="paste invite code…"></textarea>
          <button ${NETBTN} onclick="__netJoinGen()">STEP 2 — Generate my answer</button>
          <button ${NETBTN} onclick="__netCancel()">Cancel</button><div id="ansOut"></div><p id="netStat"></p><p id="netDiag" style="font-size:11px;color:#8a8272"></p>`);
      };
      window.__netJoinGen = async () => {
        const v = document.getElementById("offIn").value.trim();
        if (!v) return netStatus("Paste the invite code first.");
        try {
          netStatus("Generating answer…");
          const ans = await netJoin(v);
          document.getElementById("ansOut").innerHTML = `<p><b>STEP 3.</b> Send this ANSWER back to the host. When they hit Connect, the hunt starts automatically:</p>
            <textarea ${NETSTYLE} id="ansOutTa" readonly onclick="this.select()">${ans}</textarea>
            <button ${NETBTN} onclick="__copyBtn(this,'#ansOutTa')">Copy</button>`;
          netStatus("Waiting for the host to connect… keep this window visible!");
          setTimeout(() => { if (!NET.connected) netStatus("✗ Not connected after 30s — did the host paste your answer? Tough networks: both regenerate fresh codes and retry.", false); }, 30000);
        } catch (e) { netStatus("✗ That doesn't look like an invite code (" + e.message + ")"); }
      };
      window.__netCancel = () => { try { NET.pc && NET.pc.close(); } catch (e) {} NET.pc = NET.dc = null; NET.connected = false; netUIHide(); };

      // =====================================================================
      // LIVE TICKER (issue #12): who's playing / who's winning, bottom bar.
      // Local + P2P events always work. GLOBAL presence activates when the
      // LIVE config below is filled with a (free) Supabase project:
      //   1. supabase.com -> new project -> SQL: create table events
      //      (id bigint generated always as identity primary key,
      //       created_at timestamptz default now(), msg text not null);
      //      alter table events enable row level security;
      //      create policy "read" on events for select using (true);
      //      create policy "write" on events for insert with check (true);
      //   2. Fill url + anonKey. That's it — events flow for everyone.
      // =====================================================================
      const LIVE = { url: "", anonKey: "" };
      // Default global backend: ntfy.sh — free keyless pub/sub, works with zero
      // setup. Events are anonymous codenames only. Fill LIVE above to switch

            addKaboom(n.pos, { scale: 0.8 }); burst(n.pos, rgb(...NCFG.color), 22, 300, 9);
            popText(n.pos, "+5 HUNTER DOWN", rgb(255, 200, 140)); score += 5; updateHUD();
            liveSend(`${PLAYER_NAME} downed the hunter (+5)`);
            destroy(n); nemesis = null;
            wait(rand(12, 18), () => { if (get("player").length) spawnNemesis(true); });
          } else { n.flash = time() + 0.15; }
        }

        function spawnNemesis(returning) {
          const far = NEM_SPAWNS.slice().sort((a, b) => b.dist(player.pos) - a.dist(player.pos))[0];
          nemesis = add([
            sprite(NCFG.sprite, { anim: "idle" }), pos(far), anchor("center"), scale(NCFG.sc),
            area({ scale: vec2(NCFG.areaX, NCFG.areaY) }), body({ jumpForce: NCFG.jumpForce }), opacity(1), z(6), "nemesis",
            { hp: 3, iframes: 0, flash: 0, dir: choose([-1, 1]), state: "patrol", anim: "idle", atkCd: 0, climbing: false, senseAt: time() + 16, weapon: NCFG.mode === "ranged" ? "blaster" : "claws" },
          ]);
          nemesis.add([sprite("shadow"), pos(0, NCFG.shadowY), anchor("center"), z(-1), opacity(0.6), scale(1.8)]);
          if (NCFG.glow) {
            const g = nemesis.add([sprite("redglow"), pos(NCFG.glow[0], NCFG.glow[1]), anchor("center"), scale(0.55), opacity(0.4), z(1)]);
            g.onUpdate(() => { g.pos.x = NCFG.glow[0] * (nemesis && nemesis.flipX ? -1 : 1); g.opacity = 0.3 + Math.sin(time() * 5) * 0.15; });
          }
          if (returning) { popText(vec2(width() / 2, 90).add(getCamPos()).sub(width() / 2, height() / 2), "THE HUNTER RETURNS", rgb(235, 120, 100)); SFX.warp(); }

          // the hunter knows its hunting ground — hazards don't hurt it,
          // only the player's attacks do (otherwise it suicides on spikes)
          nemesis.onCollide("player", () => hurt());
          nemesis.onCollide("wcrate", (c) => { // the hunter arms itself too
            if (!nemesis || WEAPONS[c.wkey].side !== NKEY || time() - c.born < 1) return;
            nemesis.weapon = c.wkey; destroy(c);
          });
          const nem = nemesis;
          mkHeld(() => nem, () => nem.weapon, () => (nem.flipX ? -1 : 1));

          nemesis.onUpdate(() => {
            const n = nemesis; if (!n) return;
            const toP = player.pos.sub(n.pos), dist = toP.len(), sameFloor = Math.abs(toP.y) < 110;
            // occasionally "senses" the player from anywhere — keeps pressure on
            const wasHunting = n.state === "hunt";
            if (time() > n.senseAt) { n.state = "hunt"; n.senseAt = time() + rand(14, 22); }
            if ((dist < 400 && sameFloor) || dist < 150) n.state = "hunt";
            else if (n.state === "hunt" && dist > 650) n.state = "patrol";
            if (n.state === "hunt" && !wasHunting && time() > (n.roarCd || 0)) { n.roarCd = time() + 8; SFX.roar(); shake(7); } // it saw you

            const spd = NCFG.speed * (n.state === "hunt" ? 0.92 : 0.55) * (time() < (n.slowUntil || 0) ? 0.45 : 1);
            let vx = 0, feared = false;
            const [pc, pr] = cellOf(n.pos);
            // burning flares repel the beast (#31)
            for (const fl of get("flare")) if (fl.pos.dist(n.pos) < 150) { feared = true; vx = n.pos.x < fl.pos.x ? -1 : 1; n.dir = vx; break; }

            if (feared) { /* flee the light */ }
            else if (n.state === "patrol") {
              vx = n.dir;
              const aheadC = pc + n.dir;
              if (solid(aheadC, pr) || (!solid(aheadC, pr + 1) && !solid(aheadC, pr + 2) && n.isGrounded())) n.dir *= -1;
            } else {
              vx = toP.x > 14 ? 1 : toP.x < -14 ? -1 : 0; n.dir = vx || n.dir;
              // player is on another floor: seek a ladder in that direction
              if (!sameFloor) {
                const wantUp = toP.y < 0;
                let best = null, bd = 1e9;
                for (const L of LADDERS) {
                  const lx = L.c * TS + TS / 2, ly0 = L.r0 * TS, ly1 = (L.r1 + 1) * TS;
                  const usable = wantUp ? n.pos.y > ly0 && n.pos.y < ly1 + TS * 2 : n.pos.y < ly1;
                  const d = Math.abs(lx - n.pos.x);
                  if (usable && d < bd) { bd = d; best = { lx, wantUp }; }
                }
                if (best) {
                  vx = best.lx > n.pos.x + 8 ? 1 : best.lx < n.pos.x - 8 ? -1 : 0;
                  if (Math.abs(best.lx - n.pos.x) < 14) { n.climbing = true; n.gravityScale = 0; n.vel = vec2(0, best.wantUp ? -CLIMB : CLIMB); }
                }
              }
              if (n.climbing && sameFloor) { n.climbing = false; n.gravityScale = 1; }
              // attack in range (not while repelled by a flare)
              if (time() > n.atkCd && !feared) {
                if (NCFG.mode === "ranged" && dist < 330 && sameFloor && Math.abs(toP.y) < 46) {
                  n.atkCd = time() + 1.35; SFX.shoot();
                  const dirx = toP.x > 0 ? 1 : -1;
                  const nb = add([rect(18, 5, { radius: 2 }), pos(n.pos.x + dirx * 24, n.pos.y - 4), anchor("center"), color(255, 130, 110), outline(2, rgb(90, 30, 20)), area(), move(vec2(dirx, 0), 700), offscreen({ destroy: true }), z(5), "nbullet"]);
                  nb.onCollide("player", () => { destroy(nb); hurt(); });
                  nb.onCollide("platform", () => destroy(nb));
                } else if (NCFG.mode === "melee" && dist < (n.weapon === "tongue" ? 170 : n.weapon === "whip" ? 130 : n.weapon === "bat" ? 120 : n.weapon === "scythe" ? 110 : 90)) {
                  n.atkCd = time() + 0.9; SFX.claw(); n.move((toP.x > 0 ? 1 : -1) * 220, 0);
                }
              }
            }
            if (!n.climbing) {
              if (vx !== 0) n.move(vx * spd, 0);
              // hop over walls when blocked
              if (n.isGrounded() && vx !== 0 && solid(pc + (vx > 0 ? 1 : -1), pr)) n.jump(NCFG.jumpForce * 0.9);
            } else if (vx !== 0) n.move(vx * spd * 0.4, 0);
            n.flipX = n.dir < 0;
            // anims + hit flash
            const want = !n.isGrounded() && !n.climbing ? "jump" : Math.abs(vx) > 0 || n.climbing ? "run" : "idle";
            if (n.anim !== want) { n.anim = want; n.play(want); }
            n.opacity = time() < n.flash ? 0.5 : 1;
            if (n.pos.y > LEVEL_H + 200) { n.pos = NEM_SPAWNS[0].clone(); n.vel = vec2(0, 0); n.climbing = false; n.gravityScale = 1; }
          });
        }
        if (!NET.connected) spawnNemesis(false);

        // ============= ONLINE 2P (issue #11): remote player sync =============
        let remote = null, rTarget = null, rHp = SIDES[NKEY].maxHp;
        if (NET.connected) {
          remote = add([sprite(NCFG.sprite, { anim: "idle" }), pos(-9999, -9999), anchor("center"), scale(NCFG.sc), area({ scale: vec2(NCFG.areaX, NCFG.areaY) }), z(6), "remote", { anim: "idle" }]);
          remote.add([sprite("shadow"), pos(0, NCFG.shadowY), anchor("center"), z(-1), opacity(0.6), scale(1.8)]);
          if (NCFG.glow) {
            const g = remote.add([sprite("redglow"), pos(NCFG.glow[0], NCFG.glow[1]), anchor("center"), scale(0.55), opacity(0.4), z(1)]);
            g.onUpdate(() => { g.pos.x = NCFG.glow[0] * (remote.flipX ? -1 : 1); });
          }
          remote.onUpdate(() => { if (rTarget) remote.pos = remote.pos.lerp(rTarget, Math.min(1, dt() * 14)); });
          remote.onCollide("player", () => { if (NCFG.mode === "melee") hurt(); }); // beast body contact hurts

          // link HUD + ping + stalled-peer watchdog (#22)
          const link = add([text("", { size: 13 }), pos(width() - 14, 14), anchor("topright"), fixed(), z(200), color(120, 220, 140)]);
          loop(2, () => netSend({ t: "ping", ts: performance.now() }));
          link.onUpdate(() => {
            if (!NET.connected) { link.text = "LINK LOST"; link.color = rgb(230, 90, 80); return; }
            if (performance.now() - NET.lastPacketAt > 6000) { link.text = "⚠ PEER STALLED — their window may be hidden"; link.color = rgb(235, 170, 90); return; }
            link.text = `${NET.peerName || "Opponent"} ● ${NET.ping}ms${NET.path ? " · " + NET.path : ""}`; link.color = NET.path && NET.path.startsWith("RELAY") ? rgb(235, 190, 90) : rgb(120, 220, 140);
          });

          // name tags (#24)
          const tagY = (cfg) => cfg.shadowY * cfg.sc + 14;
          const myTag = add([text(PLAYER_NAME, { size: 13 }), anchor("center"), pos(0, 0), z(90), color(...CFG.color), outline(3, rgb(0, 0, 0))]);
          myTag.onUpdate(() => (myTag.pos = player.pos.sub(0, tagY(CFG))));
          const rTag = add([text("", { size: 13 }), anchor("center"), pos(0, 0), z(90), color(...NCFG.color), outline(3, rgb(0, 0, 0))]);
          rTag.onUpdate(() => { rTag.text = NET.peerName || "…"; rTag.pos = remote.pos.sub(0, tagY(NCFG)); rTag.opacity = remote.pos.x > -999 ? 0.9 : 0; });

          // chat (#23): T to talk, Enter sends, Esc closes
          const chatTxt = add([text("", { size: 14, width: 520 }), pos(12, height() - 96), anchor("botleft"), fixed(), z(200), color(224, 218, 200), outline(3, rgb(0, 0, 0))]);
          chatTxt.onUpdate(() => {
            const now = Date.now();
            chatTxt.text = CHAT.lines.filter((l) => now - l.at < 12000).map((l) => l.name + ": " + l.text).join("\n");
          });
          function openChat() {
            if (document.getElementById("chatIn")) return;
            const i = document.createElement("input");
            i.id = "chatIn"; i.maxLength = 90; i.placeholder = "say something… (Enter sends, Esc closes)";
            i.style.cssText = "position:fixed;left:50%;transform:translateX(-50%);bottom:44px;width:46%;padding:8px;background:#101216;color:#e6dcc8;border:1px solid #c8992e;border-radius:6px;font-family:monospace;z-index:60";
            document.body.appendChild(i);
            setTimeout(() => i.focus(), 0);
            let lastSent = 0;
            i.onkeydown = (ev) => {
              ev.stopPropagation();
              if (ev.key === "Enter") {
                const v = i.value.trim();
                if (v && Date.now() - lastSent > 800) { lastSent = Date.now(); CHAT.push(PLAYER_NAME, v); netSend({ t: "chat", text: v }); i.value = ""; }
              } else if (ev.key === "Escape") { i.onblur = null; i.remove(); refocusGame(); }
            };
            i.onblur = () => { i.remove(); refocusGame(); };
          }
          onKeyPress("t", () => setTimeout(openChat, 0));

          // outbound state @20Hz
          loop(0.05, () => netSend({ t: "s", x: Math.round(player.pos.x), y: Math.round(player.pos.y), f: facing, a: curAnim, hp, w: weapon }));
          let remoteWeapon = NCFG.mode === "ranged" ? "blaster" : "claws";
          mkHeld(() => remote, () => remoteWeapon, () => (remote.flipX ? -1 : 1));

          function remoteAttack(m) {
            if (m.kind === "flare") {
              const g = add([rect(4, 12, { radius: 2 }), pos(m.x + m.dir * 14, m.y - 6), anchor("center"), color(230, 80, 60), body(), area(), rotate(0), z(6)]);
              g.vel = vec2(m.dir * 300, -380);
              wait(0.7, () => { if (g.exists()) { igniteFlare(g.pos.clone()); destroy(g); } });
            } else if (m.kind === "bomb") {
              const g = add([sprite("bomb"), pos(m.x + m.dir * 16, m.y - 6), anchor("center"), area({ scale: 0.7 }), body(), rotate(0), z(5)]);
              g.vel = vec2(m.dir * 360, -430);
              wait(0.9, () => { if (g.exists()) { const p = g.pos.clone(); destroy(g); SFX.boom(); shake(8); burst(p, rgb(240, 170, 80), 16, 280, 8); if (player.pos.dist(p) < 110) hurt(); } });
            } else if (m.kind === "flamer") {
              SFX.flamerS();
              for (let i = 0; i < 3; i++) {
                const fl = add([circle(rand(5, 9)), pos(m.x + m.dir * (26 + i * 16), m.y - 4 + rand(-7, 7)), anchor("center"), color(255, rand(110, 190), 60), opacity(0.85), area(), lifespan(0.18, { fade: 0.14 }), z(8), { v: vec2(m.dir * rand(180, 260), rand(-40, 10)), update() { this.move(this.v); } }]);
                fl.onCollide("player", () => { if (time() > (player.burnCd2 || 0)) { player.burnCd2 = time() + 0.5; hurt(); } });
              }
            } else if (m.kind === "spine") {
              SFX.spineS();
              for (const dy2 of [-0.16, 0, 0.14]) {
                const s2 = add([rect(20, 4, { radius: 2 }), pos(m.x + m.dir * 24, m.y - 4), anchor("center"), color(216, 204, 174), outline(2, rgb(90, 60, 20)), area(), rotate(0), lifespan(0.9), opacity(1), z(5), { v: vec2(m.dir, dy2).unit().scale(700), update() { this.v.y += 320 * dt(); this.move(this.v); } }]);
                s2.onCollide("player", () => { destroy(s2); hurt(); });
                s2.onCollide("platform", () => destroy(s2));
              }
            } else if (m.kind === "roar") {
              SFX.roar(); shake(5);
              get("crow").forEach((cr2) => (cr2.fleeT = time() + 3)); // their beast's roar scatters YOUR sky too
            } else if (m.kind === "launcher") {
              SFX.toss();
              const g = add([circle(5.5), pos(m.x + m.dir * 24, m.y - 8), anchor("center"), color(255, 150, 110), outline(2, rgb(90, 40, 20)), area(), z(5), offscreen({ destroy: true }),
                { v: vec2(m.dir * 540, -280), update() { this.v.y += 680 * dt(); this.move(this.v); } }]);
              const boom = () => { if (g.exists()) { const p = g.pos.clone(); destroy(g); SFX.boom(); shake(9); burst(p, rgb(240, 170, 80), 18, 300, 8); if (player.pos.dist(p) < 105) hurt(); } };
              g.onCollide("platform", boom); g.onCollide("player", boom);
              wait(2.2, boom);
            } else if (m.kind === "ricochet") {
              SFX.crossbowS();
              const d2 = add([circle(6), pos(m.x + m.dir * 24, m.y - 6), anchor("center"), color(255, 170, 110), outline(2, rgb(110, 50, 20)), area(), z(5), opacity(1), lifespan(2.6, { fade: 0.2 }), rotate(0),
                { v: vec2(m.dir * 640, -120), b: 3, update() { this.move(this.v); this.angle += 720 * dt(); } }]);
              d2.onCollide("platform", (pl, col) => { if (--d2.b < 0) return destroy(d2); if (col && (col.isLeft() || col.isRight())) d2.v.x *= -1; else d2.v.y *= -1; });
              d2.onCollide("player", () => { destroy(d2); hurt(); });
            } else if (m.kind === "arc") {
              SFX.flamerS();
              for (let i = 0; i < 2; i++) {
                const seg = add([rect(rand(10, 18), 2.6, { radius: 1 }), pos(m.x + m.dir * (30 + i * 26), m.y - 4 + rand(-9, 9)), anchor("center"), color(140, rand(200, 240), 255), opacity(0.9), area(), rotate(rand(-30, 30)), lifespan(0.12, { fade: 0.09 }), z(8), { v: vec2(m.dir * rand(300, 380), rand(-30, 30)), update() { this.move(this.v); } }]);
                seg.onCollide("player", () => { if (time() > (player.burnCd2 || 0)) { player.burnCd2 = time() + 0.4; hurt(); } });
              }
            } else if (m.kind === "mine") {
              SFX.toss();
              const mn = add([sprite("wpn-mine"), pos(m.x + m.dir * 20, m.y + 20), anchor("center"), scale(0.8), area({ scale: 0.8 }), z(4), opacity(1), { armAt: time() + 0.9 }]);
              const boom = () => { if (mn.exists()) { const p = mn.pos.clone(); destroy(mn); SFX.boom(); shake(9); burst(p, rgb(240, 170, 80), 16, 280, 8); if (player.pos.dist(p) < 100) hurt(); } };
              mn.onUpdate(() => { mn.opacity = time() < mn.armAt ? 0.9 : 0.75 + Math.abs(Math.sin(time() * 6)) * 0.25; if (time() > mn.armAt && player.pos.dist(mn.pos) < 58) boom(); });
              wait(18, boom);
            } else if (m.kind === "spit") {
              SFX.spineS();
              const s2 = add([rect(12, 9, { radius: 4 }), pos(m.x + m.dir * 24, m.y - 4), anchor("center"), color(140, 225, 90), outline(2, rgb(50, 100, 25)), area(), opacity(1), lifespan(1.1), z(5), { v: vec2(m.dir, -0.12).unit().scale(640), update() { this.v.y += 420 * dt(); this.move(this.v); } }]);
              s2.onCollide("player", () => { destroy(s2); hurt(); });
              s2.onCollide("platform", () => { burst(s2.pos, rgb(140, 225, 90), 6, 120, 4); destroy(s2); });
            } else if (m.kind === "spear") {
              SFX.crossbowS();
              const s2 = add([rect(30, 4, { radius: 2 }), pos(m.x + m.dir * 24, m.y - 4), anchor("center"), color(232, 226, 205), outline(2, rgb(90, 60, 20)), area(), move(vec2(m.dir, 0), 1050), offscreen({ destroy: true }), z(5)]);
              s2.onCollide("player", () => { destroy(s2); hurt(); });
              s2.onCollide("platform", () => destroy(s2));
            } else if (m.kind === "shriek") {
              SFX.roar(); shake(6);
              const ring = add([circle(12), pos(m.x, m.y), anchor("center"), color(235, 238, 255), opacity(0.5), lifespan(0.34, { fade: 0.3 }), z(35)]);
              tween(12, 125, 0.32, (r2) => (ring.radius = r2), easings.easeOutQuad);
              if (player.pos.dist(vec2(m.x, m.y)) < 125) { hurt(); player.move((player.pos.x > m.x ? 1 : -1) * 320, 0); }
            } else if (WEAPONS[m.kind] && WEAPONS[m.kind].side === "human") {
              const mk = (dy, opts = {}) => {
                const b = add([rect(opts.len || 18, 5, { radius: 2 }), pos(m.x + m.dir * 24, m.y - 4), anchor("center"), color(255, 130, 110), outline(2, rgb(90, 30, 20)), area(), move(vec2(m.dir, dy).unit(), opts.spd || 780), offscreen({ destroy: true }), z(5), ...(opts.life ? [lifespan(opts.life)] : [])]);
                b.onCollide("player", () => { if (!opts.pierce) destroy(b); hurt(); });
                b.onCollide("platform", () => destroy(b));
              };
              if (m.kind === "scatter") { mk(-0.14, { life: 0.3, spd: 700 }); mk(0, { life: 0.34, spd: 730 }); mk(0.14, { life: 0.3, spd: 700 }); SFX.scatterS(); }
              else if (m.kind === "rail") { mk(0, { pierce: true, spd: 1300, len: 36 }); SFX.rail(); }
              else { mk(0, {}); SFX.shoot(); }
            } else { // melee swing
              const [w2, h2, reach] = m.kind === "scythe" ? [84, 60, 44] : m.kind === "whip" ? [110, 18, 66] : m.kind === "tongue" ? [156, 14, 94] : [54, 42, 36];
              const hb = add([rect(w2, h2, { radius: 6 }), pos(m.x + m.dir * reach, m.y - 2), anchor("center"), color(255, 130, 110), opacity(0.3), area(), lifespan(0.14, { fade: 0.14 }), z(5)]);
              hb.onCollide("player", () => { hurt(); if (m.kind === "tongue") player.move(-m.dir * 300, 0); }); SFX.claw();
            }
          }

          NET.onMsg = (m) => {
            if (m.t === "s") { rTarget = vec2(m.x, m.y); remote.flipX = m.f < 0; rHp = m.hp; if (m.w) remoteWeapon = m.w; if (remote.anim !== m.a) { remote.anim = m.a; remote.play(m.a); } }
            else if (m.t === "atk") remoteAttack(m);
            else if (m.t === "crate") spawnCrate(m.w, vec2(m.x, m.y));
            else if (m.t === "lever") { const lv = get("lever").find((o) => o.LV.g === m.g && o.LV.r === m.r); if (lv && lv.LV.closed !== m.closed) lv.LV.toggle(true); }
            else if (m.t === "pod") { const p2 = get("medkit").find((o) => Math.abs(o.pos.x - m.x) < 3 && Math.abs(o.pos.y - m.y) < 26); if (p2) destroy(p2); }
            else if (m.t === "crateTake") { const c = get("wcrate").sort((a, b) => a.pos.dist(vec2(m.x, m.y)) - b.pos.dist(vec2(m.x, m.y)))[0]; if (c && c.pos.dist(vec2(m.x, m.y)) < 40) destroy(c); }
            else if (m.t === "dead") { SFX.win(); go("over", { win: true, side: sideKey, score, online: true, how: "You hunted them down." }); }
            else if (m.t === "escaped") { SFX.lose(); go("over", { win: false, side: sideKey, score, online: true, how: "Your prey escaped." }); }
          };

          // watch for disconnect mid-game
          loop(1, () => { if (!NET.connected) { popText(player.pos.add(0, -50), "LINK LOST", rgb(230, 90, 80)); wait(1.5, () => { NET.onMsg = null; go("select"); }); } });
        }

        // dread feedback: warning text + heartbeat when the hunter is close
        onUpdate(() => {
          const n = nemesis || remote;
          const d = n ? n.pos.dist(player.pos) : 1e9;
          warn.text = "⚠ THE HUNTER IS NEAR";
          warn.opacity = d < 420 ? 0.45 + Math.sin(time() * 6) * 0.3 : 0;
          if (d < 320 && time() > nemHeartbeat) {
            nemHeartbeat = time() + (d < 180 ? 0.42 : 0.75);
            SFX.heart(d < 180);
          }
        });

        const camTarget = () => vec2(clamp(player.pos.x, width() / 2, Math.max(LEVEL_W - width() / 2, width() / 2)), clamp(player.pos.y, height() / 2, Math.max(LEVEL_H - height() / 2, height() / 2)) - 20);

        player.onUpdate(() => {
          if (!player.isGrounded()) airTime += dt(); else lastGroundedAt = time();
          // coyote window: walking off a ledge keeps the ground jump for 90ms, then it's spent
          if (!player.isGrounded() && !onLadderNow && time() - lastGroundedAt > 0.09 && jumpsLeft === maxJumps) jumpsLeft = maxJumps - 1;
          let dx = 0;
          if (isKeyDown("left") || isKeyDown("a")) dx -= 1;
          if (isKeyDown("right") || isKeyDown("d")) dx += 1;
          if (isGamepadButtonDown("dpad-left")) dx -= 1;
          if (isGamepadButtonDown("dpad-right")) dx += 1;
          const stick = getGamepadStick("left");
          if (stick && Math.abs(stick.x) > 0.3) dx += stick.x;
          dx = clamp(dx, -1, 1);
          const up = isKeyDown("up") || isKeyDown("w") || (stick && stick.y < -0.4);
          const down = isKeyDown("down") || isKeyDown("s") || (stick && stick.y > 0.4);
          // machine gun: hold to fire
          if (WEAPONS[weapon].auto && (isKeyDown("j") || isKeyDown("x") || isGamepadButtonDown("west") || isGamepadButtonDown("east"))) attack();
          // flares recharge slowly (#31)
          if (CFG.bomb && flares < 2 && time() > flareAt) { flares++; flareAt = time() + 20; }
          const wading = inWater();
          if (Math.abs(dx) > 0.05) {
            player.move(dx * (CFG.speed * (wading ? 0.55 : crouching ? 0.42 : 1) + (time() < ropeBoostT ? ropeBoost : 0)), 0); facing = dx > 0 ? 1 : -1; player.flipX = facing < 0; // thread-leap + super leap (#53): momentum carries
            if (player.isGrounded() && time() > stepAt) { stepAt = time() + (wading ? 0.34 : 0.27); stepAlt = !stepAlt; wading ? SFX.slosh() : SFX.step(stepAlt); }
          }
          // sewage: splash on entry, capped sink speed, always able to hop out
          if (wading && !wasInWater) { SFX.splash(); burst(player.pos.add(0, 10), rgb(110, 160, 130), 10, 160, 5); }
          wasInWater = wading;
          if (wading) { if (player.vel.y > 130) player.vel = vec2(player.vel.x, 130); jumpsLeft = Math.max(jumpsLeft, 1); }

          // ladder
          if (ladderActive()) {
            onLadderNow = true; player.gravityScale = 0; jumpsLeft = maxJumps;
            player.vel = vec2(player.vel.x, up ? -CLIMB : down ? CLIMB : 0);
          } else { onLadderNow = false; player.gravityScale = 1; }

          // apex hang: floatier at the top of the jump arc
          if (!onLadderNow) player.gravityScale = !player.isGrounded() && Math.abs(player.vel.y) < 70 ? 0.72 : 1;

          // crouch (#57): hold Down to duck and crawl — low enough to fit the 1-row
          // spaces under mezzanines. Sticky while there's no headroom to stand.
          const headroom = () => { const c2 = Math.floor(player.pos.x / TS), r2 = Math.floor((player.pos.y + HIT_H / 2 - HIT_H + 6) / TS); return !(GRID[r2] && GRID[r2][c2] === "="); };
          const wantCrouch = down && player.isGrounded() && !onLadderNow && !hanging && !ceilStick;
          const nowCrouch = wantCrouch || (crouching && player.isGrounded() && !headroom());
          if (nowCrouch !== crouching) {
            crouching = nowCrouch;
            player.area.scale = vec2(CFG.areaX, CFG.areaY * (crouching ? 0.55 : 1));
            player.area.offset = vec2(0, crouching ? CFG.frameH * CFG.areaY * 0.225 : 0); // keep the feet planted
          }

          // ledge grab (#40): fall past a lip with your hands close — catch it, hang, climb up
          const solidCell = (c2, r2) => GRID[r2] && GRID[r2][c2] === "=";
          if (hanging) {
            player.gravityScale = 0; player.vel = vec2(0, 0);
            if (up && hangCell) { // clamber onto the ledge
              hanging = false; grabCd = time() + 0.3; player.gravityScale = 1;
              player.pos = vec2(hangCell.c * TS + TS / 2, hangCell.r * TS - HIT_H / 2 - 2);
              landUntil = time() + 0.2; dust(player.pos.add(0, HIT_H / 2)); SFX.jump();
            } else if (down) { hanging = false; grabCd = time() + 0.4; player.gravityScale = 1; }
          } else if (!player.isGrounded() && !onLadderNow && !ceilStick && player.vel.y > 40 && time() > grabCd) {
            const handY = player.pos.y - HIT_H / 2 + 6;
            const cA = Math.floor((player.pos.x + facing * (HIT_W / 2 + 8)) / TS), rA = Math.floor(handY / TS);
            if (solidCell(cA, rA) && !solidCell(cA, rA - 1) && handY - rA * TS < Math.max(30, player.vel.y * dt() + 10)) {
              hanging = true; hangCell = { c: cA, r: rA };
              player.gravityScale = 0; player.vel = vec2(0, 0);
              player.pos = vec2(cA * TS + (facing > 0 ? -1 : 1) * (TS / 2 + HIT_W / 2 - 3) + TS / 2 - (facing > 0 ? 0 : 0), rA * TS + HIT_H / 2 - 8);
              SFX.claw();
            }
          }

          // ceiling crawl (#30): hold Up under a ceiling to latch upside-down, crawl with ←→, Down/jump releases.
          // Sustain via a direct tile check overhead — collision events stop once physics separates the bodies.
          const wasCeil = ceilStick; ceilStick = false;
          const headSolid = () => { const r2 = Math.floor((player.pos.y - 54) / TS), c2 = Math.floor(player.pos.x / TS); return GRID[r2] && GRID[r2][c2] === "="; };
          if (CFG.wallClimb && !player.isGrounded() && !onLadderNow && time() > ceilCd && !down &&
              (wasCeil ? (up || Math.abs(dx) > 0.05) && headSolid() : up && player.vel.y < 120 && headSolid())) {
            ceilStick = true; player.gravityScale = 0;
            player.vel = vec2(player.vel.x, Math.min(player.vel.y, -30)); // press up against the ceiling
            if (!wasCeil) SFX.claw();
          }
          if (wasCeil && !ceilStick) player.gravityScale = 1; // let go — the body drops

          // wall-climb (alien), only when not on a ladder
          wallStick = 0;
          if (!onLadderNow && CFG.wallClimb && !player.isGrounded() && wallActive()) {
            const into = (wallDir > 0 && dx > 0.1) || (wallDir < 0 && dx < -0.1);
            if (into) {
              wallStick = wallDir; player.flipX = wallDir < 0;
              if (up) player.vel = vec2(player.vel.x, -150); else if (player.vel.y > 60) player.vel = vec2(player.vel.x, 60);
              if (rand() < 0.35) add([circle(rand(2, 3)), pos(player.pos.x + wallDir * 12, player.pos.y + rand(-6, 10)), anchor("center"), color(150, 140, 120), opacity(0.6), lifespan(0.3, { fade: 0.3 }), z(7), { update() { this.move(0, 60); } }]);
            }
          }

          // animation state (beast gets cling/crawl on walls + ceiling + tucked drop)
          if (time() < roarUntil) setAnim("roar"); // reared up, mandibles wide (#60)
          else if (time() < lungeUntil) setAnim("jump");
          else if (hanging) setAnim("hang"); // real two-hand ledge dangle, both hunters (#60)
          else if (ceilStick) setAnim("ceil");
          else if (CFG.wallClimb && wallStick !== 0 && !player.isGrounded()) setAnim("cling");
          else if (CFG.wallClimb && !player.isGrounded() && !onLadderNow && player.vel.y > 280) setAnim("drop");
          else if (!player.isGrounded() && !onLadderNow) setAnim("jump");
          else if (onLadderNow) setAnim(CFG.wallClimb ? "cling" : lastClimbKind === "rope" ? "rope" : "climb"); // (#60) beast grips, Jack shimmies ropes
          else if (player.isGrounded() && time() < landUntil) setAnim("land");
          else if (crouching) setAnim(Math.abs(dx) > 0.05 ? "crawl" : "crouch"); // real crawl cycle (#60)
          else if (Math.abs(dx) > 0.05) setAnim("run");
          else setAnim("idle");
          // stalker ichor drips while moving
          if (CFG.wallClimb && Math.abs(dx) > 0.05 && rand() < 0.12)
            add([circle(rand(1.5, 2.5)), pos(player.pos.add(rand(-8, 8), rand(0, 14))), anchor("center"), color(90, 20, 30), opacity(0.7), lifespan(0.5, { fade: 0.4 }), z(5), { update() { this.move(0, 90); } }]);

          const target = camTarget();
          if (!camReady) { setCamPos(target); camReady = true; } else setCamPos(getCamPos().lerp(target, Math.min(1, dt() * 8)));
          if (player.pos.y > LEVEL_H + 200) hurt(true);
        });

        addOverlay();
      });

      // =====================================================================
      // GAME OVER
      // =====================================================================
      scene("over", ({ win, side, score, online, how }) => {
        onUpdate(() => themeVol(0.2));
        const s = SIDES[side];
        // rematch on the same peer link (#48): the connection stays open through
        // game over — ENTER offers a rematch, both accept -> instant next round.
        if (online && !NET.connected) { online = false; window.__netCancel(); } // link died en route
        if (online) NET.series[win ? "me" : "them"]++;
        add([sprite("sky"), pos(0, 0), fixed(), z(-100)]); menuParallax(); addFog(); addDust();
        add([rect(width(), height()), pos(0, 0), fixed(), color(...(win ? [16, 26, 20] : [26, 14, 14])), opacity(0.45), z(-10)]);
        add([sprite(s.sprite, { anim: "idle" }), pos(width() / 2, 130), anchor("center"), scale(1.1)]);
        add([text(win ? (online ? "VICTORY" : "YOU ESCAPED") : "HUNTED DOWN", { size: 54 }), pos(width() / 2, 250), anchor("center"), color(win ? rgb(150, 220, 160) : rgb(220, 110, 100)), outline(4, rgb(20, 18, 16))]);
        if (how) add([text(how, { size: 20 }), pos(width() / 2, 296), anchor("center"), color(200, 188, 170)]);
        add([text(`${s.name}   •   Energy collected: ${score}`, { size: 22 }), pos(width() / 2, how ? 334 : 312), anchor("center"), color(210, 200, 186)]);
        if (online) add([text(`Series vs ${NET.peerName || "opponent"}:  you ${NET.series.me} — ${NET.series.them} them`, { size: 18 }), pos(width() / 2, 360), anchor("center"), color(200, 165, 95)]);
        add([text(online ? "ENTER / A — rematch, sides swap!      M — menu (drops the link)" : "ENTER / A — play again      M — menu", { size: 17 }), pos(width() / 2, 392), anchor("center"), color(160, 150, 134)]);
        const statusLn = add([text("", { size: 16 }), pos(width() / 2, 422), anchor("center"), color(240, 200, 120), { update() { this.opacity = 0.7 + Math.sin(time() * 4) * 0.3; } }]);
        addOverlay();
        let live = online, meReady = false, themReady = false;
        const maybeStart = () => { if (meReady && themReady) { NET.onMsg = null; NET.mySide = NET.mySide === "human" ? "stalker" : "human"; go("game", NET.mySide); } }; // sides swap every rematch: the hunter becomes the hunted
        if (online) {
          NET.onMsg = (m) => {
            if (m.t === "rematch") { themReady = true; if (!meReady) statusLn.text = `${NET.peerName || "Opponent"} wants a rematch — ENTER to accept!`; maybeStart(); }
            else if (m.t === "left") { live = false; NET.onMsg = null; window.__netCancel(); statusLn.text = `${NET.peerName || "Opponent"} left the hunt — M for menu`; }
          };
          loop(0.5, () => { if (live && !NET.connected) { live = false; statusLn.text = "LINK LOST — M for menu"; } });
        }
        const again = () => {
          if (!online) return go("game", side);
          if (!live || meReady) return;
          meReady = true; netSend({ t: "rematch" });
          if (!themReady) statusLn.text = `Rematch offered — waiting for ${NET.peerName || "opponent"}…`;
          maybeStart();
        };
        onKeyPress("enter", again); onKeyPress("space", again); onGamepadButtonPress("south", again);
        const toMenu = () => { if (live) netSend({ t: "left" }); if (online) { NET.onMsg = null; window.__netCancel(); } go("select"); };
        onKeyPress("m", toMenu); onGamepadButtonPress("start", toMenu);
      });

      onLoad(() => go("boot"));
    </script>
  </body>
</html>
